splunk_observability:
  cluster:
    name: my_cluster_name
    environment: my_environment
  intersight:
    key_id_path: /path/to/intersight/key/id
    key_path: /path/to/intersight/key/file
  nexus:
    username: admin
    device_list:
      - 198.18.0.1
      - 198.18.0.2
      - 198.18.0.3
    features:
      bgp: false
      environment: false
      facts: false
      interfaces: true
      optics: true
  otel_collector:
    metrics_collection:
      etcd_metrics: true
      nvidia_gpu_metrics: true
      portworx_metrics: true
      trident_metrics: false
    pure_flash_arrays:
      - name: my_pfa_array_1
        namespace: purefa
        endpoint: my-pfa-array-1-endpoint
        auth_token: "{{ lookup('ansible.builtin.env', 'PFA_ARRAY_1_AUTH_TOKEN') }}"
    proxy:
      http_proxy: http://my-proxy:8080
      https_proxy: http://my-proxy:8080
      no_proxy: localhost,10.0.0.0/8,172.132.0.0/15,.svc.cluster.local,.cluster.local,apps.<cluster>.example.com,.<cluster>.example.com,.example.com
  splunk_platform:
    endpoint: https://splunk-platform-endpoint
    index: my_index