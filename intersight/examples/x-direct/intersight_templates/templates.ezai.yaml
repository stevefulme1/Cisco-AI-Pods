---
# =========================================================
#   Templates
# =========================================================
intersight:
  configure:
    default:
      templates:
        chassis:
          - create_template: true
            imc_access_policy: KVMAccess
            power_policy: X9508
            name: X9508
            thermal_policy: X9508
        domain:
          - certificate_management_policy: LDAP-Certificates
            create_template: true
            name: XDirect
            network_connectivity_policy: DNS
            ntp_policy: NTP
            ldap_policy: LDAP
            port_policies:
              - A
              - B
            switch_control_policy: SwCtrl
            syslog_policy: Syslog
            system_qos_policy: QoS
            vlan_policies:
              - VLANs
        server:
          - bios_policy: GPUTraining-M8-AMD-Tpm
            boot_order_policy: M2-Boot
            create_template: true
            firmware_policy: Recommended
            imc_access_policy: KVMAccess
            ipmi_over_lan_policy: IPMIWithEncryption
            lan_connectivity_policy: RoCEv2Optimized
            local_user_policy: LocalUsers
            name: AIOptimized
            power_policy: Server
            serial_over_lan_policy: SoL
            server_family: All
            storage_policy: ModelCache
            target_platform: FIAttached
            thermal_policy: Balanced
            uuid_pool: UUID
            virtual_kvm_policy: vKVM
