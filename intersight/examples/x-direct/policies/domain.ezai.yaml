---
# =========================================================
#   Policies -> Domain - Variables
# =========================================================
intersight:
  configure:
    default:
      policies:
        flow_control:
          - name: FlowCtrl
        link_aggregation:
          - lacp_rate: fast
            name: LinkAgg
        link_control:
          - name: LinkCtrl
        multicast:
          - name: Multicast
        port:
          - device_model: UCSX-S9108-100G
            names:
              - A
              - B
            port_channel_ethernet_uplinks:
              - flow_control_policy: FlowCtrl
                interfaces:
                  - port_id: 1
                  - port_id: 2
                  - port_id: 3
                  - port_id: 4
                link_aggregation_policy: LinkAgg
                link_control_policy: LinkCtrl
                pc_ids:
                  - 1
            target_platform: UCS Domain
        switch_control:
          - name: SwCtrl
            target_platform: UCS Domain
        system_qos:
          - configure_recommended_classes: true
            description: System QoS Policy
            jumbo_mtu: true
            name: QoS
            priority_flow_control_watchdog_configuration:
              shutdown_multiplier: 1
              watchdog_enabled: true
              watchdog_interval: 500
            target_platform: UCS Domain
        vlan:
          - name: Vlans
            target_platform: UCS Domain
            vlans:
              - auto_allow_on_uplinks: true
                multicast_policy: Multicast
                name: vlan_
                vlan_list: 101-102
