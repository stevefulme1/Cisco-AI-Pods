---
# =========================================================
#   Profiles
# =========================================================
intersight:
  configure:
    default:
      profiles:
        chassis:
          - action: No-op
            imc_access_policy: KVMAccess
            power_policy: X9508
            targets:
              - name: UCSAI-1
                serial_number: FOX29100000
              - name: UCSAI-2
                serial_number: FOX29100001
            thermal_policy: X9508
        domain:
          - action: Deploy
            attach_template: true
            name: UCSAI-1
            serial_numbers:
              - FDO29100001
              - FDO29100002
            ucs_domain_profile_template: XDirect
          - action: Deploy
            attach_template: true
            name: UCSAI-2
            serial_numbers:
              - FDO29100003
              - FDO29100004
            ucs_domain_profile_template: XDirect
        server:
          - action: No-op
            attach_template: true
            domain_name: UCSAI-1
            target_platform: FIAttached
            targets:
              - name: UCSAI-1-1
                pre_assign:
                  chassis_id: 1
                  initial_auto_deploy_when_server_is_available: true
                  slot_id: 1
              - name: UCSAI-1-3
                pre_assign:
                  chassis_id: 1
                  initial_auto_deploy_when_server_is_available: true
                  slot_id: 4
              - name: UCSAI-1-5
                pre_assign:
                  chassis_id: 1
                  initial_auto_deploy_when_server_is_available: true
                  slot_id: 5
              - name: UCSAI-1-7
                pre_assign:
                  chassis_id: 1
                  initial_auto_deploy_when_server_is_available: true
                  slot_id: 8
            ucs_server_profile_template: AIOptimized
          - action: No-op
            attach_template: true
            domain_name: UCSAI-2
            target_platform: FIAttached
            targets:
              - name: UCSAI-2-1
                pre_assign:
                  chassis_id: 1
                  initial_auto_deploy_when_server_is_available: true
                  slot_id: 1
              - name: UCSAI-2-3
                pre_assign:
                  chassis_id: 1
                  initial_auto_deploy_when_server_is_available: true
                  slot_id: 4
              - name: UCSAI-2-5
                pre_assign:
                  chassis_id: 1
                  initial_auto_deploy_when_server_is_available: true
                  slot_id: 5
              - name: UCSAI-2-7
                pre_assign:
                  chassis_id: 1
                  initial_auto_deploy_when_server_is_available: true
                  slot_id: 8
            ucs_server_profile_template: AIOptimized
