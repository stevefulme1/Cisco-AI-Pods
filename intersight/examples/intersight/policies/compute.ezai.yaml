---
# =========================================================
#   Policies -> Compute - Variables
# =========================================================
intersight:
  configure:
    common:
      policies:
        bios:
          - baud_rate: '115200'
            bios_template: Virtualization-M8-AMD-Tpm
            boot_performance_mode: Max Performance
            console_redirection: com-0
            name: VirtualizationM8AmdTpm
            serial_port_aenable: enabled
            terminal_type: vt100
    Asgard:
      policies:
        bios:
          - baud_rate: '115200'
            bios_template: AzureStack-M7-Intel-Tpm
            boot_performance_mode: Max Performance
            console_redirection: com-0
            name: AzureStackM7IntelTpm
            serial_port_aenable: enabled
            terminal_type: vt100
