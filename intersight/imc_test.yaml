---
- name: Configure Intersight Pools
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    intersight_api_key_id: "{{ lookup('ansible.builtin.env', 'intersight_api_key_id') }}"
    intersight_api_private_key: "{{ lookup('ansible.builtin.env', 'intersight_secret_key') }}"
    intersight_api_uri: "{{ lookup('ansible.builtin.env', 'intersight_api_uri') | default('https://intersight.com/api/v1', true) }}"
  environment:
    INTERSIGHT_API_KEY_ID: "{{ intersight_api_key_id }}"
    INTERSIGHT_API_PRIVATE_KEY: "{{ intersight_api_private_key }}"
    INTERSIGHT_API_URI: "{{ intersight_api_uri }}"
  tasks:
    - name: Configure IMC Access policy
      cisco.intersight.intersight_imc_access_policy:
        api_key_id: "{{ intersight_api_key_id }}"
        api_private_key: "{{ intersight_api_private_key }}"
        api_uri: "{{ intersight_api_uri }}"
        name: sjc02-d23-access
        description: IMC access for SJC02 rack D23
        organization: Asgard
        vlan_id: 131
        ip_pool: 65d3788b69627531014e8cdb
