---
- name: Compute consumed dependency flags for profile families
  ansible.builtin.set_fact:
    consumed_chassis_profiles_exists: >-
      {{ query('ansible.builtin.subelements', merged_model.intersight.organizations | dict2items, 'value.profiles.chassis', {'skip_missing': True}) | length > 0 }}
    consumed_chassis_templates_exists: >-
      {{ query('ansible.builtin.subelements', merged_model.intersight.organizations | dict2items, 'value.templates.chassis', {'skip_missing': True}) | length > 0 }}
    consumed_domain_profiles_exists: >-
      {{ query('ansible.builtin.subelements', merged_model.intersight.organizations | dict2items, 'value.profiles.domain', {'skip_missing': True}) | length > 0 }}
    consumed_domain_templates_exists: >-
      {{ query('ansible.builtin.subelements', merged_model.intersight.organizations | dict2items, 'value.templates.domain', {'skip_missing': True}) | length > 0 }}
    consumed_server_profiles_exists: >-
      {{ query('ansible.builtin.subelements', merged_model.intersight.organizations | dict2items, 'value.profiles.server', {'skip_missing': True}) | length > 0 }}
    consumed_server_templates_exists: >-
      {{ query('ansible.builtin.subelements', merged_model.intersight.organizations | dict2items, 'value.templates.server', {'skip_missing': True}) | length > 0 }}

- name: Dependency org maps
  ansible.builtin.include_tasks: tasks/profiles_dependencies/organizations.yaml
  when: >-
    (
      consumed_server_profiles_exists
      or consumed_server_templates_exists
      or consumed_domain_profiles_exists
      or consumed_domain_templates_exists
      or consumed_chassis_profiles_exists
      or consumed_chassis_templates_exists
    )
    and
    (
      (org_name_to_moid | default({}) | length == 0)
      or
      (org_moid_to_name | default({}) | length == 0)
    )

- name: Profile dependency LAN Connectivity
  ansible.builtin.include_tasks: tasks/profiles_dependencies/lan_connectivity.yaml
  when: consumed_server_profiles_exists or consumed_server_templates_exists

- name: Profile dependency SAN Connectivity
  ansible.builtin.include_tasks: tasks/profiles_dependencies/san_connectivity.yaml
