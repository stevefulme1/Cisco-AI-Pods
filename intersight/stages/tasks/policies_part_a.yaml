- name: Configure Thermal policies
  # noqa: args[module]
  cisco.intersight.intersight_thermal_policy: >-
    {{
      (lookup('template', 'templates/thermal.yaml.j2') | from_yaml)
      | combine({
          'state': 'present',
          'validate_certs': module_validate_certs
        })
    }}
  loop: "{{ query('ansible.builtin.subelements', organizations_map | dict2items, 'value.policies.thermal', {'skip_missing': True}) }}"
  loop_control:
    label: "{{ item.0.key ~ '/' ~ item.1.name }}"
  tags:
    - policies.thermal

