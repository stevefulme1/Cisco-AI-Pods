  cisco.intersight.intersight_bios_policy:
    api_key_id: "{{ intersight_api_key_id }}"
    api_private_key: "{{ intersight_api_private_key }}"
    api_uri: "{{ intersight_api_uri }}"
    description: "{{ item.1.description | default('') }}"
    name: "{{ _prefix ~ item.1.name ~ _suffix }}"
    organization: "{{ item.0.key }}"
    state: present
    validate_certs: "{{ module_validate_certs }}"
