---
- name: Configure Adapter Configuration policies
  vars:
    adapter_template_path: "{{ playbook_dir }}/tasks/templates/adapter_configuration.yaml.j2"
    adapter_policy_payload: "{{ lookup('template', adapter_template_path) | from_yaml }}"
    _prefix: "{{ policy_name_prefix.adapter_configuration | default(policy_name_prefix.default | default('')) }}"
    _suffix: "{{ policy_name_suffix.adapter_configuration | default(policy_name_suffix.default | default('')) }}"
  cisco.intersight.intersight_adapter_config_policy:
    description: "{{ item.1.description | default('') }}"
    name: "{{ _prefix ~ item.1.name ~ _suffix }}"
    organization: "{{ item.0.key }}"
    settings: "{{ adapter_policy_payload.settings | default(omit) }}"
    state: present
    validate_certs: "{{ module_validate_certs }}"
  loop: >-
    {%- set query_result = query('ansible.builtin.subelements',
        organizations_map | dict2items,
        'value.policies.adapter_configuration',
        {'skip_missing': True}) -%}
    {{ query_result }}
  loop_control:
    label: "{{ item.0.key ~ '/' ~ item.1.name }}"
  tags:
    - policies.adapter_configuration

- name: Print BIOS Settings for debugging
  ansible.builtin.debug:
    msg: "{{ item.1 | merge_schema_defaults(intersight_schema, 'intersight.bios') | to_module_params('intersight_bios_policy') }}"
  loop: >-
    {%- set query_result = query('ansible.builtin.subelements',
        organizations_map | dict2items,
        'value.policies.bios',
        {'skip_missing': True}) -%}
    {{ query_result }}
  loop_control:
    label: "{{ item.0.key ~ '/' ~ item.1.name }}"
  tags:
    - policies.bios

- name: Configure BIOS policies
