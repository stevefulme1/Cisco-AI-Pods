---
- name: Build Ethernet Network policies consumed from LAN Connectivity
  ansible.builtin.set_fact:
    consumed_ethernet_network_policies: >-
      {%- set policies = [] -%}
      {%- set lcps = query('ansible.builtin.subelements', merged_model.intersight.organizations | dict2items, 'value.policies.lan_connectivity', {'skip_missing': True}) -%}
      {%- for org_item, lcp_policy in lcps -%}
        {%- if lcp_policy.vnics is defined -%}
          {%- for vnic in lcp_policy.vnics -%}
            {%- if vnic.ethernet_network_policy is defined -%}
              {%- set ref = vnic.ethernet_network_policy -%}
              {%- set _ = policies.append({'name': ref.rsplit('/', 1) | last, 'organization': ref.rsplit('/', 1) | first if '/' in ref else org_item.key}) -%}
            {%- endif -%}
          {%- endfor -%}
        {%- endif -%}
      {%- endfor -%}
      {{ policies }}

- name: Get Ethernet Network Policies from Intersight
  vars:
    consumed_ethernet_network_policies_by_org: >-
      {%- set grouped = {} -%}
      {%- for policy in consumed_ethernet_network_policies | default([]) -%}
        {%- if policy.organization not in grouped -%}
          {%- set _ = grouped.update({policy.organization: []}) -%}
        {%- endif -%}
        {%- if policy.name not in grouped[policy.organization] -%}
          {%- set _ = grouped[policy.organization].append(policy.name) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ grouped }}
    consumed_ethernet_network_policy_queries: >-
      {%- set queries = [] -%}
      {%- for org_item in consumed_ethernet_network_policies_by_org | dict2items -%}
        {%- set quoted_names = [] -%}
        {%- for policy_name in org_item.value -%}
          {%- set _ = quoted_names.append("'" ~ policy_name ~ "'") -%}
        {%- endfor -%}
        {%- if quoted_names | length > 0 -%}
          {%- set _ = queries.append({
            'organization': org_item.key,
            'names_filter': quoted_names | join(', ')
          }) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ queries }}
  cisco.intersight.intersight_rest_api:
    # noqa: args[module]
    query_params:
      $filter: "Name in ({{ item.names_filter }}) and Organization.Moid eq '{{ org_name_to_moid[item.organization] }}'"
    resource_path: /vnic/EthNetworkPolicies
    return_list: true
    validate_certs: "{{ module_validate_certs }}"
  loop: "{{ consumed_ethernet_network_policy_queries }}"
  loop_control:
    label: "{{ item.organization }}"
  register: ethernet_network_policies_info

- name: Set Ethernet Network policies dictionary
  ansible.builtin.set_fact:
    ethernet_network_policies_by_org: >-
      {{
        ethernet_network_policies_by_org | default({})
        | combine({
            organization_name: (
              ethernet_network_policies_by_org[organization_name] | default({})
            ) | combine({ item.Name: item.Moid }, recursive=True)
          }, recursive=True)
      }}
  vars:
    organization_name: "{{ org_moid_to_name[item.Organization.Moid] }}"
  loop: "{{ ethernet_network_policies_info.results | map(attribute='api_response') | flatten | list }}"

- name: Debug Ethernet Network policies dictionary
  ansible.builtin.debug:
    var: ethernet_network_policies_by_org
  when: debug_module | bool
