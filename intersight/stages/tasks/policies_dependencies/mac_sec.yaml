---
- name: Build MAC Sec policies consumed from Port
  ansible.builtin.set_fact:
    consumed_mac_sec_policies: >-
      {%- set policies = [] -%}
      {%- set ports = query('ansible.builtin.subelements', merged_model.intersight.organizations | dict2items, 'value.policies.port', {'skip_missing': True}) -%}
      {%- for org_item, port_policy in ports -%}
        {%- if port_policy.port_channel_ethernet_uplinks is defined -%}
          {%- for uplink in port_policy.port_channel_ethernet_uplinks -%}
            {%- if uplink.mac_sec_policy is defined -%}
              {%- set ref = uplink.mac_sec_policy -%}
              {%- set _ = policies.append({'name': ref.rsplit('/', 1) | last, 'organization': ref.rsplit('/', 1) | first if '/' in ref else org_item.key}) -%}
            {%- endif -%}
          {%- endfor -%}
        {%- endif -%}
        {%- if port_policy.port_role_ethernet_uplinks is defined -%}
          {%- for uplink in port_policy.port_role_ethernet_uplinks -%}
            {%- if uplink.mac_sec_policy is defined -%}
              {%- set ref = uplink.mac_sec_policy -%}
              {%- set _ = policies.append({'name': ref.rsplit('/', 1) | last, 'organization': ref.rsplit('/', 1) | first if '/' in ref else org_item.key}) -%}
            {%- endif -%}
          {%- endfor -%}
        {%- endif -%}
      {%- endfor -%}
      {{ policies }}

- name: Get MAC Sec Policies from Intersight
  vars:
    consumed_mac_sec_policies_by_org: >-
      {%- set grouped = {} -%}
      {%- for policy in consumed_mac_sec_policies | default([]) -%}
        {%- if policy.organization not in grouped -%}
          {%- set _ = grouped.update({policy.organization: []}) -%}
        {%- endif -%}
        {%- if policy.name not in grouped[policy.organization] -%}
          {%- set _ = grouped[policy.organization].append(policy.name) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ grouped }}
    consumed_mac_sec_policy_queries: >-
      {%- set queries = [] -%}
      {%- for org_item in consumed_mac_sec_policies_by_org | dict2items -%}
        {%- set quoted_names = [] -%}
        {%- for policy_name in org_item.value -%}
          {%- set _ = quoted_names.append("'" ~ policy_name ~ "'") -%}
        {%- endfor -%}
        {%- if quoted_names | length > 0 -%}
          {%- set _ = queries.append({
            'organization': org_item.key,
            'names_filter': quoted_names | join(', ')
          }) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ queries }}
  cisco.intersight.intersight_rest_api:
    # noqa: args[module]
    query_params:
      $filter: "Name in ({{ item.names_filter }}) and Organization.Moid eq '{{ org_name_to_moid[item.organization] }}'"
    resource_path: /fabric/MacSecPolicies
    return_list: true
    validate_certs: "{{ module_validate_certs }}"
  loop: "{{ consumed_mac_sec_policy_queries }}"
  loop_control:
    label: "{{ item.organization }}"
  register: mac_sec_policies_info
  when: consumed_mac_sec_policies | default([]) | length > 0

- name: Set MAC Sec policies dictionary
  ansible.builtin.set_fact:
    mac_sec_policies_by_org: >-
      {{
        mac_sec_policies_by_org | default({})
        | combine({
            organization_name: (
              mac_sec_policies_by_org[organization_name] | default({})
            ) | combine({ item.Name: item.Moid }, recursive=True)
          }, recursive=True)
      }}
  vars:
    organization_name: "{{ org_moid_to_name[item.Organization.Moid] }}"
  loop: "{{ mac_sec_policies_info.results | map(attribute='api_response') | flatten | list }}"
  when: mac_sec_policies_info.results | default([]) | length > 0

- name: Debug MAC Sec policies dictionary
  ansible.builtin.debug:
    var: mac_sec_policies_by_org
  when: debug_module | bool
