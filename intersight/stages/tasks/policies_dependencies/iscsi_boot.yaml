---
- name: Build iSCSI Boot policies consumed from LAN Connectivity and vNIC Templates
  ansible.builtin.set_fact:
    consumed_iscsi_boot_policies: >-
      {%- set policies = [] -%}
      {%- set lcps = query('ansible.builtin.subelements', merged_model.intersight.organizations | dict2items, 'value.policies.lan_connectivity', {'skip_missing': True}) -%}
      {%- for org_item, lcp_policy in lcps -%}
        {%- if lcp_policy.vnics is defined -%}
          {%- for vnic in lcp_policy.vnics -%}
            {%- if vnic.iscsi_boot_policy is defined -%}
              {%- set ref = vnic.iscsi_boot_policy -%}
              {%- set _ = policies.append({'name': ref.rsplit('/', 1) | last, 'organization': ref.rsplit('/', 1) | first if '/' in ref else org_item.key}) -%}
            {%- endif -%}
          {%- endfor -%}
        {%- endif -%}
        {%- if lcp_policy.vnics_from_template is defined -%}
          {%- for vnic in lcp_policy.vnics_from_template -%}
            {%- if vnic.iscsi_boot_policy is defined -%}
              {%- set ref = vnic.iscsi_boot_policy -%}
              {%- set _ = policies.append({'name': ref.rsplit('/', 1) | last, 'organization': ref.rsplit('/', 1) | first if '/' in ref else org_item.key}) -%}
            {%- endif -%}
          {%- endfor -%}
        {%- endif -%}
      {%- endfor -%}
      {%- set templates = query('ansible.builtin.subelements', merged_model.intersight.organizations | dict2items, 'value.policies.vnic_template', {'skip_missing': True}) -%}
      {%- for org_item, vnic_template in templates -%}
        {%- if vnic_template.iscsi_boot_policy is defined -%}
          {%- set ref = vnic_template.iscsi_boot_policy -%}
          {%- set _ = policies.append({'name': ref.rsplit('/', 1) | last, 'organization': ref.rsplit('/', 1) | first if '/' in ref else org_item.key}) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ policies }}

- name: Get iSCSI Boot Policies from Intersight
  # noqa: args[module]
  cisco.intersight.intersight_iscsi_boot_policy_info:
    name: "{{ item.name }}"
    organization: "{{ item.organization }}"
    validate_certs: "{{ module_validate_certs }}"
  loop: "{{ consumed_iscsi_boot_policies | default([]) | map('to_json') | unique | map('from_json') | list }}"
  loop_control:
    label: "{{ (item.organization | default('global')) ~ '/' ~ (item.name | default(item.key | default(item | string))) }}"
  register: iscsi_boot_policies_info

- name: Set iSCSI Boot policies dictionary
  ansible.builtin.set_fact:
    iscsi_boot_policies_by_org: >-
      {{
        iscsi_boot_policies_by_org | default({})
        | combine({ organization_name: (iscsi_boot_policies_by_org[organization_name] | default({})) | combine({ item.Name: item.Moid }) }, recursive=True)
      }}
  vars:
    organization_name: "{{ org_moid_to_name[item.Organization.Moid] }}"
  loop: "{{ iscsi_boot_policies_info.results | map(attribute='api_response') | flatten | list }}"

- name: Debug iSCSI Boot policies dictionary
  ansible.builtin.debug:
    var: iscsi_boot_policies_by_org
  when: debug_module | bool
