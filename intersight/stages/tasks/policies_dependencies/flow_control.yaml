---
- name: Build Flow Control policies consumed from Port
  ansible.builtin.set_fact:
    consumed_flow_control_policies: >-
      {%- set policies = [] -%}
      {%- set ports = query('ansible.builtin.subelements', merged_model.intersight.organizations | dict2items, 'value.policies.port', {'skip_missing': True}) -%}
      {%- for org_item, port_policy in ports -%}
        {%- if port_policy.port_channel_ethernet_uplinks is defined -%}
          {%- for uplink in port_policy.port_channel_ethernet_uplinks -%}
            {%- if uplink.flow_control_policy is defined -%}
              {%- set ref = uplink.flow_control_policy -%}
              {%- set _ = policies.append({'name': ref.rsplit('/', 1) | last, 'organization': ref.rsplit('/', 1) | first if '/' in ref else org_item.key}) -%}
            {%- endif -%}
          {%- endfor -%}
        {%- endif -%}
        {%- if port_policy.port_role_ethernet_uplinks is defined -%}
          {%- for uplink in port_policy.port_role_ethernet_uplinks -%}
            {%- if uplink.flow_control_policy is defined -%}
              {%- set ref = uplink.flow_control_policy -%}
              {%- set _ = policies.append({'name': ref.rsplit('/', 1) | last, 'organization': ref.rsplit('/', 1) | first if '/' in ref else org_item.key}) -%}
            {%- endif -%}
          {%- endfor -%}
        {%- endif -%}
      {%- endfor -%}
      {{ policies }}

- name: Get Flow Control Policies from Intersight
  # noqa: args[module]
  cisco.intersight.intersight_flow_control_policy_info:
    name: "{{ item.name }}"
    organization: "{{ item.organization }}"
    validate_certs: "{{ module_validate_certs }}"
  loop: "{{ consumed_flow_control_policies | default([]) | map('to_json') | unique | map('from_json') | list }}"
  loop_control:
    label: "{{ (item.organization | default('global')) ~ '/' ~ (item.name | default(item.key | default(item | string))) }}"
  register: flow_control_policies_info

- name: Build Flow Control policies dictionary keyed by org / name from the Flow Control policies info call
  ansible.builtin.set_fact:
    flow_control_policies_by_org: >-
      {{
        flow_control_policies_by_org | default({})
        | combine({ organization_name: (flow_control_policies_by_org[organization_name] | default({})) | combine({ item.Name: item.Moid }) }, recursive=True)
      }}
  vars:
    organization_name: "{{ org_moid_to_name[item.Organization.Moid] }}"
  loop: "{{ flow_control_policies_info.results | map(attribute='api_response') | flatten | list }}"

- name: Debug Flow Control policies dictionary
  ansible.builtin.debug:
    var: flow_control_policies_by_org
  when: debug_module | bool
