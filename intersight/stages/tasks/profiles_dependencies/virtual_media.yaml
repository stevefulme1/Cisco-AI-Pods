---
- name: Build Virtual Media policies consumed from Server Profiles and Profile Templates
  ansible.builtin.set_fact:
    consumed_virtual_media_policies: >-
      {%- set policies = [] -%}
      {%- set sp_subelems = query('ansible.builtin.subelements', merged_model.intersight.organizations | dict2items, 'value.profiles.server', {'skip_missing': True}) -%}
      {%- for org_item, server_profile in sp_subelems -%}
        {%- if server_profile.virtual_media_policy is defined and server_profile.virtual_media_policy != '' -%}
          {%- set ref = server_profile.virtual_media_policy -%}
          {%- set _ = policies.append({'name': ref.rsplit('/', 1) | last, 'organization': ref.rsplit('/', 1) | first if '/' in ref else org_item.key}) -%}
        {%- endif -%}
      {%- endfor -%}
      {%- set spt_subelems = query('ansible.builtin.subelements', merged_model.intersight.organizations | dict2items, 'value.templates.server', {'skip_missing': True}) -%}
      {%- for org_item, server_profile_template in spt_subelems -%}
        {%- if server_profile_template.virtual_media_policy is defined and server_profile_template.virtual_media_policy != '' -%}
          {%- set ref = server_profile_template.virtual_media_policy -%}
          {%- set _ = policies.append({'name': ref.rsplit('/', 1) | last, 'organization': ref.rsplit('/', 1) | first if '/' in ref else org_item.key}) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ policies }}

- name: Get Virtual Media Policies from Intersight
  vars:
    consumed_virtual_media_policies_by_org: >-
      {%- set grouped = {} -%}
      {%- for policy in consumed_virtual_media_policies | default([]) -%}
        {%- if policy.organization not in grouped -%}
          {%- set _ = grouped.update({policy.organization: []}) -%}
        {%- endif -%}
        {%- if policy.name not in grouped[policy.organization] -%}
          {%- set _ = grouped[policy.organization].append(policy.name) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ grouped }}
    consumed_virtual_media_policy_queries: >-
      {%- set queries = [] -%}
      {%- for org_item in consumed_virtual_media_policies_by_org | dict2items -%}
        {%- set quoted_names = [] -%}
        {%- for policy_name in org_item.value -%}
          {%- set _ = quoted_names.append("'" ~ policy_name ~ "'") -%}
        {%- endfor -%}
        {%- if quoted_names | length > 0 -%}
          {%- set _ = queries.append({
            'organization': org_item.key,
            'names_filter': quoted_names | join(', ')
          }) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ queries }}
  cisco.intersight.intersight_rest_api:
    # noqa: args[module]
    query_params:
      $filter: "Name in ({{ item.names_filter }}) and Organization.Moid eq '{{ org_name_to_moid[item.organization] }}'"
    resource_path: /vmedia/Policies
    return_list: true
    validate_certs: "{{ module_validate_certs }}"
  loop: "{{ consumed_virtual_media_policy_queries }}"
  loop_control:
    label: "{{ item.organization }}"
  register: virtual_media_policies_info
  when: consumed_virtual_media_policies | default([]) | length > 0

- name: Set Virtual Media policies dictionary
  ansible.builtin.set_fact:
    virtual_media_policies_by_org: >-
      {{
        virtual_media_policies_by_org | default({})
        | combine({
            organization_name: (
              virtual_media_policies_by_org[organization_name] | default({})
            ) | combine({ item.Name: item.Moid }, recursive=True)
          }, recursive=True)
      }}
  vars:
    organization_name: "{{ org_moid_to_name[item.Organization.Moid] }}"
  loop: "{{ virtual_media_policies_info.results | map(attribute='api_response') | flatten | list }}"
  when: virtual_media_policies_info.results | default([]) | length > 0

- name: Debug Virtual Media policies dictionary
  ansible.builtin.debug:
    var: virtual_media_policies_by_org
  when: debug_module | bool
