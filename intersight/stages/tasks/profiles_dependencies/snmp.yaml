---
- name: Build SNMP policies consumed from all Profiles and Profile Templates
  ansible.builtin.set_fact:
    consumed_snmp_policies: >
      {%- set snmp_policies = [] -%}
      {%- set chassis_profiles = query('ansible.builtin.subelements', merged_model.intersight.organizations | dict2items, 'value.profiles.chassis', {'skip_missing': True}) -%}
      {%- for org_item, profile in chassis_profiles -%}
        {%- if profile.snmp_policy is defined and profile.snmp_policy != '' -%}
          {%- set ref = profile.snmp_policy -%}
          {%- set _ = snmp_policies.append({'name': ref.rsplit('/', 1) | last, 'organization': ref.rsplit('/', 1) | first if '/' in ref else org_item.key}) -%}
        {%- endif -%}
      {%- endfor -%}
      {%- set chassis_templates = query('ansible.builtin.subelements', merged_model.intersight.organizations | dict2items, 'value.templates.chassis', {'skip_missing': True}) -%}
      {%- for org_item, template in chassis_templates -%}
        {%- if template.snmp_policy is defined and template.snmp_policy != '' -%}
          {%- set ref = template.snmp_policy -%}
          {%- set _ = snmp_policies.append({'name': ref.rsplit('/', 1) | last, 'organization': ref.rsplit('/', 1) | first if '/' in ref else org_item.key}) -%}
        {%- endif -%}
      {%- endfor -%}
      {%- set domain_profiles = query('ansible.builtin.subelements', merged_model.intersight.organizations | dict2items, 'value.profiles.domain', {'skip_missing': True}) -%}
      {%- for org_item, profile in domain_profiles -%}
        {%- if profile.snmp_policy is defined and profile.snmp_policy != '' -%}
          {%- set ref = profile.snmp_policy -%}
          {%- set _ = snmp_policies.append({'name': ref.rsplit('/', 1) | last, 'organization': ref.rsplit('/', 1) | first if '/' in ref else org_item.key}) -%}
        {%- endif -%}
      {%- endfor -%}
      {%- set domain_templates = query('ansible.builtin.subelements', merged_model.intersight.organizations | dict2items, 'value.templates.domain', {'skip_missing': True}) -%}
      {%- for org_item, template in domain_templates -%}
        {%- if template.snmp_policy is defined and template.snmp_policy != '' -%}
          {%- set ref = template.snmp_policy -%}
          {%- set _ = snmp_policies.append({'name': ref.rsplit('/', 1) | last, 'organization': ref.rsplit('/', 1) | first if '/' in ref else org_item.key}) -%}
        {%- endif -%}
      {%- endfor -%}
      {%- set server_profiles = query('ansible.builtin.subelements', merged_model.intersight.organizations | dict2items, 'value.profiles.server', {'skip_missing': True}) -%}
      {%- for org_item, profile in server_profiles -%}
        {%- if profile.snmp_policy is defined and profile.snmp_policy != '' -%}
          {%- set ref = profile.snmp_policy -%}
          {%- set _ = snmp_policies.append({'name': ref.rsplit('/', 1) | last, 'organization': ref.rsplit('/', 1) | first if '/' in ref else org_item.key}) -%}
        {%- endif -%}
      {%- endfor -%}
      {%- set server_templates = query('ansible.builtin.subelements', merged_model.intersight.organizations | dict2items, 'value.templates.server', {'skip_missing': True}) -%}
      {%- for org_item, template in server_templates -%}
        {%- if template.snmp_policy is defined and template.snmp_policy != '' -%}
          {%- set ref = template.snmp_policy -%}
          {%- set _ = snmp_policies.append({'name': ref.rsplit('/', 1) | last, 'organization': ref.rsplit('/', 1) | first if '/' in ref else org_item.key}) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ snmp_policies | unique }}

- name: Build list of unique SNMP policies
  ansible.builtin.set_fact:
    unique_snmp_policies: "{{ consumed_snmp_policies | map('to_json') | unique | map('from_json') | list }}"

- name: Get SNMP Policies from Intersight
  # noqa: args[module]
  cisco.intersight.intersight_snmp_policy_info:
    name: "{{ item.name }}"
    organization: "{{ item.organization }}"
    validate_certs: "{{ module_validate_certs }}"
  loop: "{{ unique_snmp_policies | default([]) }}"
  loop_control:
    label: "{{ (item.organization | default('global')) ~ '/' ~ (item.name | default(item.key | default(item | string))) }}"
  register: snmp_policies_info

- name: Set SNMP policies dictionary
  ansible.builtin.set_fact:
    snmp_policies_by_org: >-
      {{
        snmp_policies_by_org | default({})
        | combine({
            organization_name: (
              snmp_policies_by_org[organization_name] | default({})
            ) | combine({ item.Name: item.Moid }, recursive=True)
          }, recursive=True)
      }}
  vars:
    organization_name: "{{ org_moid_to_name[item.Organization.Moid] }}"
  loop: "{{ snmp_policies_info.results | map(attribute='api_response') | flatten | list }}"

- name: Debug SNMP policies dictionary
  ansible.builtin.debug:
    var: snmp_policies_by_org
  when: debug_module | bool
