---
- name: Build LDAP policies consumed from Domain and Server Profiles and Profile Templates
  ansible.builtin.set_fact:
    consumed_ldap_policies: >
      {%- set ldap_policies = [] -%}
      {%- set domain_profiles = query('ansible.builtin.subelements', merged_model.intersight.organizations | dict2items, 'value.profiles.domain', {'skip_missing': True}) -%}
      {%- for org_item, profile in domain_profiles -%}
        {%- if profile.ldap_policy is defined and profile.ldap_policy != '' -%}
          {%- set ref = profile.ldap_policy -%}
          {%- set _ = ldap_policies.append({'name': ref.rsplit('/', 1) | last, 'organization': ref.rsplit('/', 1) | first if '/' in ref else org_item.key}) -%}
        {%- endif -%}
      {%- endfor -%}
      {%- set domain_templates = query('ansible.builtin.subelements', merged_model.intersight.organizations | dict2items, 'value.templates.domain', {'skip_missing': True}) -%}
      {%- for org_item, template in domain_templates -%}
        {%- if template.ldap_policy is defined and template.ldap_policy != '' -%}
          {%- set ref = template.ldap_policy -%}
          {%- set _ = ldap_policies.append({'name': ref.rsplit('/', 1) | last, 'organization': ref.rsplit('/', 1) | first if '/' in ref else org_item.key}) -%}
        {%- endif -%}
      {%- endfor -%}
      {%- set server_profiles = query('ansible.builtin.subelements', merged_model.intersight.organizations | dict2items, 'value.profiles.server', {'skip_missing': True}) -%}
      {%- for org_item, profile in server_profiles -%}
        {%- if profile.ldap_policy is defined and profile.ldap_policy != '' -%}
          {%- set ref = profile.ldap_policy -%}
          {%- set _ = ldap_policies.append({'name': ref.rsplit('/', 1) | last, 'organization': ref.rsplit('/', 1) | first if '/' in ref else org_item.key}) -%}
        {%- endif -%}
      {%- endfor -%}
      {%- set server_templates = query('ansible.builtin.subelements', merged_model.intersight.organizations | dict2items, 'value.templates.server', {'skip_missing': True}) -%}
      {%- for org_item, template in server_templates -%}
        {%- if template.ldap_policy is defined and template.ldap_policy != '' -%}
          {%- set ref = template.ldap_policy -%}
          {%- set _ = ldap_policies.append({'name': ref.rsplit('/', 1) | last, 'organization': ref.rsplit('/', 1) | first if '/' in ref else org_item.key}) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ ldap_policies | unique }}

- name: Build list of unique LDAP policies
  ansible.builtin.set_fact:
    unique_ldap_policies: "{{ consumed_ldap_policies | map('to_json') | unique | map('from_json') | list }}"

- name: Get LDAP Policies from Intersight
  # noqa: args[module]
  cisco.intersight.intersight_ldap_policy_info:
    name: "{{ item.name }}"
    organization: "{{ item.organization }}"
    validate_certs: "{{ module_validate_certs }}"
  loop: "{{ unique_ldap_policies | default([]) }}"
  loop_control:
    label: "{{ (item.organization | default('global')) ~ '/' ~ (item.name | default(item.key | default(item | string))) }}"
  register: ldap_policies_info

- name: Set LDAP policies dictionary
  ansible.builtin.set_fact:
    ldap_policies_by_org: >-
      {{
        ldap_policies_by_org | default({})
        | combine({
            organization_name: (
              ldap_policies_by_org[organization_name] | default({})
            ) | combine({ item.Name: item.Moid }, recursive=True)
          }, recursive=True)
      }}
  vars:
    organization_name: "{{ org_moid_to_name[item.Organization.Moid] }}"
  loop: "{{ ldap_policies_info.results | map(attribute='api_response') | flatten | list }}"

- name: Debug LDAP policies dictionary
  ansible.builtin.debug:
    var: ldap_policies_by_org
  when: debug_module | bool
