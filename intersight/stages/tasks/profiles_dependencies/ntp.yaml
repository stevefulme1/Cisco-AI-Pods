---
- name: Build NTP policies consumed from Domain and Server Profiles and Profile Templates
  ansible.builtin.set_fact:
    consumed_ntp_policies: >
      {%- set ntp_policies = [] -%}
      {%- set domain_profiles = query('ansible.builtin.subelements', merged_model.intersight.organizations | dict2items, 'value.profiles.domain', {'skip_missing': True}) -%}
      {%- for org_item, profile in domain_profiles -%}
        {%- if profile.ntp_policy is defined and profile.ntp_policy != '' -%}
          {%- set ref = profile.ntp_policy -%}
          {%- set _ = ntp_policies.append({'name': ref.rsplit('/', 1) | last, 'organization': ref.rsplit('/', 1) | first if '/' in ref else org_item.key}) -%}
        {%- endif -%}
      {%- endfor -%}
      {%- set domain_templates = query('ansible.builtin.subelements', merged_model.intersight.organizations | dict2items, 'value.templates.domain', {'skip_missing': True}) -%}
      {%- for org_item, template in domain_templates -%}
        {%- if template.ntp_policy is defined and template.ntp_policy != '' -%}
          {%- set ref = template.ntp_policy -%}
          {%- set _ = ntp_policies.append({'name': ref.rsplit('/', 1) | last, 'organization': ref.rsplit('/', 1) | first if '/' in ref else org_item.key}) -%}
        {%- endif -%}
      {%- endfor -%}
      {%- set server_profiles = query('ansible.builtin.subelements', merged_model.intersight.organizations | dict2items, 'value.profiles.server', {'skip_missing': True}) -%}
      {%- for org_item, profile in server_profiles -%}
        {%- if profile.ntp_policy is defined and profile.ntp_policy != '' -%}
          {%- set ref = profile.ntp_policy -%}
          {%- set _ = ntp_policies.append({'name': ref.rsplit('/', 1) | last, 'organization': ref.rsplit('/', 1) | first if '/' in ref else org_item.key}) -%}
        {%- endif -%}
      {%- endfor -%}
      {%- set server_templates = query('ansible.builtin.subelements', merged_model.intersight.organizations | dict2items, 'value.templates.server', {'skip_missing': True}) -%}
      {%- for org_item, template in server_templates -%}
        {%- if template.ntp_policy is defined and template.ntp_policy != '' -%}
          {%- set ref = template.ntp_policy -%}
          {%- set _ = ntp_policies.append({'name': ref.rsplit('/', 1) | last, 'organization': ref.rsplit('/', 1) | first if '/' in ref else org_item.key}) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ ntp_policies | unique }}

- name: Get NTP Policies from Intersight
  vars:
    consumed_ntp_policies_by_org: >-
      {%- set grouped = {} -%}
      {%- for policy in consumed_ntp_policies | default([]) -%}
        {%- if policy.organization not in grouped -%}
          {%- set _ = grouped.update({policy.organization: []}) -%}
        {%- endif -%}
        {%- if policy.name not in grouped[policy.organization] -%}
          {%- set _ = grouped[policy.organization].append(policy.name) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ grouped }}
    consumed_ntp_policy_queries: >-
      {%- set queries = [] -%}
      {%- for org_item in consumed_ntp_policies_by_org | dict2items -%}
        {%- set quoted_names = [] -%}
        {%- for policy_name in org_item.value -%}
          {%- set _ = quoted_names.append("'" ~ policy_name ~ "'") -%}
        {%- endfor -%}
        {%- if quoted_names | length > 0 -%}
          {%- set _ = queries.append({
            'organization': org_item.key,
            'names_filter': quoted_names | join(', ')
          }) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ queries }}
  cisco.intersight.intersight_rest_api:
    # noqa: args[module]
    query_params:
      $filter: "Name in ({{ item.names_filter }}) and Organization.Moid eq '{{ org_name_to_moid[item.organization] }}'"
    resource_path: /ntp/Policies
    return_list: true
    validate_certs: "{{ module_validate_certs }}"
  loop: "{{ consumed_ntp_policy_queries }}"
  loop_control:
    label: "{{ item.organization }}"
  register: ntp_policies_info
  when: consumed_ntp_policies | default([]) | length > 0

- name: Set NTP policies dictionary
  ansible.builtin.set_fact:
    ntp_policies_by_org: >-
      {{
        ntp_policies_by_org | default({})
        | combine({
            organization_name: (
              ntp_policies_by_org[organization_name] | default({})
            ) | combine({ item.Name: item.Moid }, recursive=True)
          }, recursive=True)
      }}
  vars:
    organization_name: "{{ org_moid_to_name[item.Organization.Moid] }}"
  loop: "{{ ntp_policies_info.results | map(attribute='api_response') | flatten | list }}"
  when: ntp_policies_info.results | default([]) | length > 0

- name: Build list of unique NTP policies
  ansible.builtin.set_fact:
    unique_ntp_policies: "{{ consumed_ntp_policies | map('to_json') | unique | map('from_json') | list }}"

- name: Debug all NTP policies
  ansible.builtin.debug:
    msg: "Unique NTP policies collected across domain and server profile types"
  when: debug_module | bool
