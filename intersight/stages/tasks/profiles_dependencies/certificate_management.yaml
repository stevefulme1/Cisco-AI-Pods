---
- name: Build Certificate Management policies consumed from Domain and Server Profiles and Profile Templates
  ansible.builtin.set_fact:
    consumed_certificate_management_policies: >
      {%- set certificate_management_policies = [] -%}
      {%- set domain_profiles = query('ansible.builtin.subelements', merged_model.intersight.organizations | dict2items, 'value.profiles.domain', {'skip_missing': True}) -%}
      {%- for org_item, profile in domain_profiles -%}
        {%- if profile.certificate_management_policy is defined and profile.certificate_management_policy != '' -%}
          {%- set ref = profile.certificate_management_policy -%}
          {%- set _ = certificate_management_policies.append({'name': ref.rsplit('/', 1) | last, 'organization': ref.rsplit('/', 1) | first if '/' in ref else org_item.key}) -%}
        {%- endif -%}
      {%- endfor -%}
      {%- set domain_templates = query('ansible.builtin.subelements', merged_model.intersight.organizations | dict2items, 'value.templates.domain', {'skip_missing': True}) -%}
      {%- for org_item, template in domain_templates -%}
        {%- if template.certificate_management_policy is defined and template.certificate_management_policy != '' -%}
          {%- set ref = template.certificate_management_policy -%}
          {%- set _ = certificate_management_policies.append({'name': ref.rsplit('/', 1) | last, 'organization': ref.rsplit('/', 1) | first if '/' in ref else org_item.key}) -%}
        {%- endif -%}
      {%- endfor -%}
      {%- set server_profiles = query('ansible.builtin.subelements', merged_model.intersight.organizations | dict2items, 'value.profiles.server', {'skip_missing': True}) -%}
      {%- for org_item, profile in server_profiles -%}
        {%- if profile.certificate_management_policy is defined and profile.certificate_management_policy != '' -%}
          {%- set ref = profile.certificate_management_policy -%}
          {%- set _ = certificate_management_policies.append({'name': ref.rsplit('/', 1) | last, 'organization': ref.rsplit('/', 1) | first if '/' in ref else org_item.key}) -%}
        {%- endif -%}
      {%- endfor -%}
      {%- set server_templates = query('ansible.builtin.subelements', merged_model.intersight.organizations | dict2items, 'value.templates.server', {'skip_missing': True}) -%}
      {%- for org_item, template in server_templates -%}
        {%- if template.certificate_management_policy is defined and template.certificate_management_policy != '' -%}
          {%- set ref = template.certificate_management_policy -%}
          {%- set _ = certificate_management_policies.append({'name': ref.rsplit('/', 1) | last, 'organization': ref.rsplit('/', 1) | first if '/' in ref else org_item.key}) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ certificate_management_policies | unique }}

- name: Build list of unique Certificate Management policies
  ansible.builtin.set_fact:
    unique_certificate_management_policies: "{{ consumed_certificate_management_policies | map('to_json') | unique | map('from_json') | list }}"

- name: Get Certificate Management Policies from Intersight
  # noqa: args[module]
  cisco.intersight.intersight_certificate_management_policy_info:
    name: "{{ item.name }}"
    organization: "{{ item.organization }}"
    validate_certs: "{{ module_validate_certs }}"
  loop: "{{ unique_certificate_management_policies | default([]) }}"
  loop_control:
    label: "{{ (item.organization | default('global')) ~ '/' ~ (item.name | default(item.key | default(item | string))) }}"
  register: certificate_management_policies_info

- name: Set Certificate Management policies dictionary
  ansible.builtin.set_fact:
    certificate_management_policies_by_org: >-
      {{
        certificate_management_policies_by_org | default({})
        | combine({
            organization_name: (
              certificate_management_policies_by_org[organization_name] | default({})
            ) | combine({ item.Name: item.Moid }, recursive=True)
          }, recursive=True)
      }}
  vars:
    organization_name: "{{ org_moid_to_name[item.Organization.Moid] }}"
  loop: "{{ certificate_management_policies_info.results | map(attribute='api_response') | flatten | list }}"

- name: Debug Certificate Management policies dictionary
  ansible.builtin.debug:
    var: certificate_management_policies_by_org
  when: debug_module | bool
