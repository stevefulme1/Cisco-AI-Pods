---
- name: Build UUID pools consumed from Server Profiles and Profile Templates
  ansible.builtin.set_fact:
    consumed_uuid_pools: >-
      {%- set pools = [] -%}
      {%- set sp_subelems = query('ansible.builtin.subelements', merged_model.intersight.organizations | dict2items, 'value.profiles.server', {'skip_missing': True}) -%}
      {%- for org_item, server_profile in sp_subelems -%}
        {%- if server_profile.uuid_pool is defined -%}
          {%- set ref = server_profile.uuid_pool -%}
          {%- set _ = pools.append({'name': ref.rsplit('/', 1) | last, 'organization': ref.rsplit('/', 1) | first if '/' in ref else org_item.key}) -%}
        {%- endif -%}
      {%- endfor -%}
      {%- set spt_subelems = query('ansible.builtin.subelements', merged_model.intersight.organizations | dict2items, 'value.templates.server', {'skip_missing': True}) -%}
      {%- for org_item, server_profile_template in spt_subelems -%}
        {%- if server_profile_template.uuid_pool is defined -%}
          {%- set ref = server_profile_template.uuid_pool -%}
          {%- set _ = pools.append({'name': ref.rsplit('/', 1) | last, 'organization': ref.rsplit('/', 1) | first if '/' in ref else org_item.key}) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ pools }}

- name: Get UUID Pools from Intersight
  # noqa: args[module]
  cisco.intersight.intersight_uuid_pool_info:
    name: "{{ item.name }}"
    organization: "{{ item.organization }}"
    validate_certs: "{{ module_validate_certs }}"
  loop: "{{ consumed_uuid_pools | default([]) | map('to_json') | unique | map('from_json') | list }}"
  loop_control:
    label: "{{ (item.organization | default('global')) ~ '/' ~ (item.name | default(item.key | default(item | string))) }}"
  register: uuid_pools_info

- name: Set UUID pools dictionary
  ansible.builtin.set_fact:
    uuid_pools_by_org: >-
      {{
        uuid_pools_by_org | default({})
        | combine({
            organization_name: (
              uuid_pools_by_org[organization_name] | default({})
            ) | combine({ item.Name: item.Moid }, recursive=True)
          }, recursive=True)
      }}
  vars:
    organization_name: "{{ org_moid_to_name[item.Organization.Moid] }}"
  loop: "{{ uuid_pools_info.results | map(attribute='api_response') | flatten | list }}"

- name: Debug UUID pools dictionary
  ansible.builtin.debug:
    var: uuid_pools_by_org
  when: debug_module | bool
