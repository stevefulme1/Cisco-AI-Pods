- name: Report unsupported policy types in this module set
  ansible.builtin.debug:
    msg:
      - "Skipping unsupported policy type 'scrub' (no dedicated cisco.intersight module)."
      - "Skipping unsupported policy type 'serial_over_lan' (no dedicated cisco.intersight module)."
      - "Skipping unsupported policy type 'ethernet_network' (no dedicated cisco.intersight module)."
  tags:
    - always
