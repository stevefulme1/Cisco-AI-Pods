---
- name: Configure iSCSI Boot policies
  # noqa: args[module]
  cisco.intersight.intersight_iscsi_boot_policy: >-
    {{
      (lookup('template', 'templates/iscsi_boot.yaml.j2') | from_yaml)
      | combine({
          'state': 'present',
          'validate_certs': module_validate_certs
        })
    }}
  loop: "{{ query('ansible.builtin.subelements', organizations_map | dict2items, 'value.policies.iscsi_boot', {'skip_missing': True}) }}"
  loop_control:
    label: "{{ item.0.key ~ '/' ~ item.1.name }}"
  tags:
    - policies.iscsi_boot

- name: Configure LAN Connectivity policies
  # noqa: args[module]
  cisco.intersight.intersight_lan_connectivity_policy: >-
    {{
      (lookup('template', 'templates/lan_connectivity.yaml.j2') | from_yaml)
      | combine({
          'state': 'present',
          'validate_certs': module_validate_certs
        })
    }}
  loop: "{{ query('ansible.builtin.subelements', organizations_map | dict2items, 'value.policies.lan_connectivity', {'skip_missing': True}) }}"
  loop_control:
    label: "{{ item.0.key ~ '/' ~ item.1.name }}"
  tags:
    - policies.lan_connectivity

- name: Build Port policy payloads  # noqa jinja[invalid]
  ansible.builtin.set_fact:
    expanded_port_policy_payloads: "{{ (expanded_port_policy_payloads | default([])) + _payloads }}"
  vars:
    _payloads: >-
      {{
        item.1
        | merge_schema_defaults(intersight_schema, 'intersight.port')
        | split_port_policies(
            policy_name_prefix.default | default(''),
            policy_name_suffix.default | default('')
          )
        | map('to_module_params', 'intersight_port_policy')
        | map('combine', {
            'organization': item.0.key,
            'state': 'present',
            'validate_certs': module_validate_certs
          })
        | list
      }}
  loop: "{{ query('ansible.builtin.subelements', organizations_map | dict2items, 'value.policies.port', {'skip_missing': True}) }}"
  tags:
    - policies.port

- name: Configure Port policies
  # noqa: args[module]
  cisco.intersight.intersight_port_policy: >-
    {{
      item
      | combine({
          'state': 'present',
          'validate_certs': module_validate_certs
        })
    }}
  loop: "{{ expanded_port_policy_payloads | default([]) }}"
  loop_control:
    label: "{{ (item.organization | default('global')) ~ '/' ~ (item.name | default(item.key | default(item | string))) }}"
  tags:
    - policies.port

