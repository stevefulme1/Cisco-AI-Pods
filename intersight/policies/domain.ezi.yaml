---
#======================================
#   Policies -> Domain - Variables
#======================================
Common:
  policies:
    flow_control:
      - name: FlowCtrl
    link_aggregation:
      - lacp_rate: fast
        name: LinkAgg
    link_control:
      - name: LinkCtrl
    switch_control:
      - name: SwCtrl
        switching_mode_ethernet: end-host
    system_qos:
      - configure_recommended_classes: true
        description: System QoS Policy
        jumbo_mtu: true
        name: QoS
