---
# yaml-language-server: $schema=/home/tyscott@rich.ciscolabs.com/scotttyso/Cisco-AI-Pods/schema/cisco-ai-pods.json --- IGNORE ---
# =========================================================
#   Policies -> Management - Variables
# =========================================================
intersight:
  organizations:
    Asgard:
      policies:
        imc_access:
          - inband_ip_pool: common/kvm-inband
            inband_vlan_id: 1502
            name: KVMAccess
            out_of_band_ip_pool: common/kvm-ooband
          - inband_ip_pool: common/kvm-inband
            inband_vlan_id: 1502
            name: KVMAccessv2
            out_of_band_ip_pool: common/kvm-ooband
    common:
      policies:
        local_user:
          - name: LocalUsers
            password_properties:
              always_send_user_password: false
              enable_password_expiry: true
              enforce_strong_password: true
              grace_period: 0
              notification_period: 15
              password_expiry_duration: 90
              password_history: 0
            users:
              - enabled: true
                password: 1
                role: admin
                username: admin
        network_connectivity:
          - dns_servers_v4:
              - 198.18.51.49
              - 198.18.5.103
            name: DNS
        ntp:
          - name: NTP
            ntp_servers:
              - 198.18.50.7
              - 198.18.33.162
              - 198.18.65.96
            timezone: America/Detroit
        serial_over_lan:
          - name: SoL
        snmp:
          - name: SNMP
            snmp_port: 161
        syslog:
          - local_logging:
              minimum_severity: warning
            name: Syslog
        # ========================================== imc_access:
        # ==========================================   - description: aci-kvm IMC Access Policy
        # ==========================================     inband_ip_pool: kvm-inband
        # ==========================================     inband_vlan_id: 101
        # ==========================================     ipv4_address_configuration: true
        # ==========================================     name: aci-kvm
        # ==========================================     out_of_band_ip_pool: kvm-ooband
        ipmi_over_lan:
          - description: ipmi IPMI over LAN Policy
            name: ipmi
            privilege: admin
        ldap:
          - base_settings:
              domain: rich.ciscolabs.com
            binding_parameters:
              bind_dn: CN=Tyson Scott,OU=Cisco Employees,DC=rich,DC=ciscolabs,DC=com
              bind_method: ConfiguredCredentials
            description: RICH LDAP Policy
            enable_group_authorization: false
            ldap_groups:
              - end_point_role: admin
                group_dn: CN=Domain Admins,OU=Users,DC=rich,DC=ciscolabs,DC=com
                name: Domain Admins
            ldap_servers:
              - port: 389
                server: 10.101.128.15
                vendor: MSAD
              - port: 389
                server: 10.101.128.16
                vendor: MSAD
            name: RICH
            nested_group_search_depth: 128
            search_parameters:
              attribute: memberof
              filter: sAMAccountName=$userid
              group_attribute: memberof
            user_search_precedence: LocalUserDb
        virtual_kvm:
          - allow_tunneled_vkvm: true
            description: vkvm Virtual KVM Policy
            enable_local_server_video: true
            enable_video_encryption: true
            name: vkvm
            remote_port: 2068
    default:
      policies:
        certificate_management:
          - assigned_sensitive_data: true
            certificates:
              - type: IMC
                certificate_file: ~/scotttyso/certificates/r142c-osv/api-r142c-osv.cer
                private_key_file: ~/scotttyso/certificates/r142c-osv/api-r142c-osv.key
              - name: RootExample
                type: RootCA
                certificate_file: ~/scotttyso/certificates/rich-AD2-CA-1.crt
            name: Example_Certificates
        device_connector:
          - configuration_from_intersight_only: false
            description: devcon Device Connector Policy
            name: devcon
        network_connectivity:
          - description: dns_with_v6 Network Connectivity Policy
            dns_servers_v4:
              - 208.67.220.220
              - 208.67.222.222
            dns_servers_v6:
              - 2620:119:35::35
              - 2620:119:53::53
            name: dns_with_v6
        smtp:
          - description: smtp SMTP Policy
            mail_alert_recipients:
              - admin@example.com
              - infra-ops@example.com
            minimum_severity: critical
            name: smtp
            smtp_alert_sender_address: intersight@example.com
            smtp_port: 25
            smtp_server_address: mail.example.com
        snmp:
          - description: snmp SNMP Policy
            name: snmp
            snmp_port: 161
            snmp_trap_destinations:
              - destination_address: 198.18.1.61
                port: 162
                user: snmpadmin
            snmp_users:
              - auth_password: 1
                auth_type: SHA
                name: snmpadmin
                privacy_password: 1
                privacy_type: AES
                security_level: AuthPriv
            system_contact: admin@example.com
            system_location: Example Corporation
        ssh:
          - description: ssh SSH Policy
            name: ssh
            ssh_port: 22
            ssh_timeout: 1800
        syslog:
          - description: syslog Syslog Policy
            local_logging:
              minimum_severity: warning
            name: syslog
            remote_logging:
              - enable: true
                hostname: 198.18.5.14
                minimum_severity: warning
                port: 514
                protocol: udp
              - enable: true
                hostname: 198.18.5.15
                minimum_severity: warning
                port: 514
                protocol: udp
