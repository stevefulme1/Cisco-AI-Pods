---
# yaml-language-server: $schema=/home/tyscott@rich.ciscolabs.com/scotttyso/Cisco-AI-Pods/schema/cisco-ai-pods.json --- IGNORE ---
# =========================================================
#   Policies -> Domain - Variables
# =========================================================
intersight:
  configure:
    common:
      policies:
        flow_control:
          - name: FlowCtrl
        link_aggregation:
          - lacp_rate: fast
            name: LinkAgg
        link_control:
          - name: LinkCtrl
        switch_control:
          - name: SwCtrl
            switching_mode_ethernet: end-host
            target_platform: UCS Domain
        system_qos:
          - configure_recommended_classes: true
            description: System QoS Policy
            jumbo_mtu: true
            name: QoS
            target_platform: UCS Domain
