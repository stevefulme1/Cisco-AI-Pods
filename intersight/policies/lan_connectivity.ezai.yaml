---
# yaml-language-server: $schema=/home/tyscott@rich.ciscolabs.com/scotttyso/Cisco-AI-Pods/schema/cisco-ai-pods.json --- IGNORE ---
# =========================================================
#   Policies -> LAN Connectivity - Variables
# =========================================================
intersight:
  organizations:
    Asgard:
      policies:
        lan_connectivity:
          - name: ControllerLCP
            target_platform: FIAttached
            vnics:
              - enable_failover: true
                ethernet_adapter_policy: common/Linux-v2
                ethernet_network_control_policy: common/both
                ethernet_network_group_policies:
                  - common/aci-mgmt
                ethernet_qos_policy: common/best-effort
                mac_address_pools:
                  - common/single
                names:
                  - eno5
                placement:
                  pci_order:
                    - 0
          - name: ControllerLCPv2
            target_platform: FIAttached
            vnics:
              - enable_failover: true
                ethernet_adapter_policy: common/16RxQs5G
                ethernet_network_control_policy: common/both
                ethernet_network_group_policies:
                  - common/aci-mgmt
                ethernet_qos_policy: common/best-effort
                mac_address_pools:
                  - common/single
                names:
                  - eno5
                placement:
                  pci_order:
                    - 0
          - name: WorkerLCP
            target_platform: FIAttached
            vnics:
              - enable_failover: true
                ethernet_adapter_policy: common/Linux-v2
                ethernet_network_control_policy: common/both
                ethernet_network_group_policies:
                  - common/aci-mgmt
                  - common/aci-dvs
                ethernet_qos_policy: common/best-effort
                mac_address_pools:
                  - common/single
                names:
                  - eno5
                  - eno6
                placement:
                  pci_order:
                    - 0
                    - 1
              - ethernet_adapter_policy: common/16RxQs5G
                ethernet_network_control_policy: common/both
                ethernet_network_group_policies:
                  - common/aci-storage
                ethernet_qos_policy: common/platinum
                mac_address_pools:
                  - common/single
                names:
                  - eno7
                  - eno8
                placement:
                  pci_order:
                    - 2
                    - 3
              - ethernet_adapter_policy: common/16RxQs5G
                ethernet_network_control_policy: common/both
                ethernet_network_group_policies:
                  - common/aci-storage
                ethernet_qos_policy: common/platinum
                mac_address_pools:
                  - common/single
                names:
                  - eno9
                  - eno10
                placement:
                  pci_order:
                    - 4
                    - 5
              - enable_failover: true
                ethernet_adapter_policy: common/16RxQs5G
                ethernet_network_control_policy: common/both
                ethernet_network_group_policies:
                  - common/aci-storage
                ethernet_qos_policy: common/platinum
                mac_address_pools:
                  - common/single
                names:
                  - eno11
                placement:
                  pci_order:
                    - 6
          - name: WorkerLCPv2
            target_platform: FIAttached
            vnics:
              - enable_failover: true
                ethernet_adapter_policy: common/16RxQs5G
                ethernet_network_control_policy: common/both
                ethernet_network_group_policies:
                  - common/aci-mgmt
                  - common/aci-dvs
                ethernet_qos_policy: common/best-effort
                mac_address_pools:
                  - common/single
                names:
                  - eno5
                  - eno6
                placement:
                  pci_order:
                    - 0
                    - 1
                  switch_ids:
                    - A
                    - B
              - enable_failover: true
                ethernet_adapter_policy: common/Linux-v2
                ethernet_network_control_policy: common/both
                ethernet_network_group_policies:
                  - common/aci-storage
                ethernet_qos_policy: common/platinum
                mac_address_pools:
                  - common/single
                names:
                  - eno7
                placement:
                  pci_order:
                    - 2
                  switch_ids:
                    - B
