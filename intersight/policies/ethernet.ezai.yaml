---
# yaml-language-server: $schema=/home/tyscott@rich.ciscolabs.com/scotttyso/Cisco-AI-Pods/schema/cisco-ai-pods.json --- IGNORE ---
#========================================
#   Policies -> Ethernet - Variables
#========================================
intersight:
  organizations:
    Common:
      policies:
        ethernet_adapter:
          - adapter_template: 16RxQs-5G
            name: 16RxQs5G
          - adapter_template: 16RxQs-5G
            name: Linux-NVMe-RoCE
            roce_settings:
              class_of_service: 5
              enable_rdma_over_converged_ethernet: true
              memory_regions: 131072
              queue_pairs: 1024
              resource_groups: 8
              version: 2
          - adapter_template: Linux-v2
            name: Linux-v2
        ethernet_network_control:
          - cdp_enable: true
            lldp_enable_receive: true
            lldp_enable_transmit: true
            name: CdpLldp
        ethernet_qos:
          - mtu: 9000
            name: BestEffort
            priority: Best Effort
            rate_limit: 100000
          - mtu: 9000
            name: Platinum
            priority: Platinum
            rate_limit: 100000
    EXAMPLE:
      policies:
        ethernet_network_group:
          - allowed_vlans: '1501'
            name: EXAMPLE:VLAN1501:AI:PRD:MGMT:OOB
            native_vlan: 1501
          - allowed_vlans: '1502'
            name: EXAMPLE:VLAN1502:AI:PRD:MGMT:IB
            native_vlan: 1502
          - allowed_vlans: '1503'
            name: EXAMPLE:VLAN1503:AI:PRD:VM:MGMT
          - allowed_vlans: '1504'
            name: EXAMPLE:VLAN1504:AI:PRD:NFS
            native_vlan: 1504
          - allowed_vlans: '1504'
            name: EXAMPLE:VLAN1504:AI:PRD:Storage
            native_vlan: 1504
          - allowed_vlans: '1505'
            name: EXAMPLE:VLAN1505:AI:PRD:NVMe-oF:A
            native_vlan: 1505
          - allowed_vlans: '1506'
            name: EXAMPLE:VLAN1506:AI:PRD:NVMe-oF:B
            native_vlan: 1506
    common:
      policies:
        ethernet_adapter:
          - adapter_template: Win-AzureStack
            description: Win-AzureStack Ethernet Adapter
            name: Win-AzureStack
          - adapter_template: VMware
            description: VMware Ethernet Adapter
            name: VMware
        ethernet_network_control:
          - cdp_enable: true
            description: cdp Ethernet Network Control Policy
            lldp_enable_receive: true
            lldp_enable_transmit: true
            name: both
          - cdp_enable: true
            description: cdp Ethernet Network Control Policy
            name: cdp
          - description: lldp Ethernet Network Control Policy
            lldp_enable_receive: true
            lldp_enable_transmit: true
            name: lldp
        ethernet_network_group:
          - allowed_vlans: 101-103,1000-1199
            name: aci-uplink
          - allowed_vlans: '101'
            name: aci-mgmt
            native_vlan: 101
          - allowed_vlans: '102'
            name: aci-migration
            native_vlan: 102
          - allowed_vlans: '103'
            name: aci-storage
            native_vlan: 103
          - allowed_vlans: 101-103,1000-1199
            name: aci-dvs
            native_vlan: 1
        ethernet_qos:
          - description: Best Effort Ethernet QoS Policy
            mtu: 9000
            name: best-effort
            priority: Best Effort
          - description: Bronze Ethernet QoS Policy
            mtu: 9000
            name: bronze
            priority: Bronze
          - description: Gold Ethernet QoS Policy
            mtu: 9000
            name: gold
            priority: Gold
          - description: Platinum Ethernet QoS Policy
            mtu: 9000
            name: platinum
            priority: Platinum
          - description: Silver Ethernet QoS Policy
            mtu: 9000
            name: silver
            priority: Silver
    default:
      policies:
        adapter_configuration:
          - add_vic_adapter_configuration:
              - dce_interface_settings:
                  dce_interface_1_fec_mode: cl91
                  dce_interface_2_fec_mode: cl91
                  dce_interface_3_fec_mode: cl91
                  dce_interface_4_fec_mode: cl91
                enable_fip: true
                enable_lldp: true
                enable_physical_nic_mode: false
                enable_port_channel: true
                pci_slot: MLOM
            description: adapter Adapter Configuration Policy
            name: adapter
        ethernet_network:
          - default_vlan: 4
            description: network Ethernet Network Policy
            name: network
            vlan_mode: ACCESS
        ethernet_network_control:
          - cdp_enable: true
            description: cdp Ethernet Network Control Policy
            name: cdp
        ethernet_network_group:
          - allowed_vlans: "15"
            name: iSCSI-VLG-A
            native_vlan: 15
          - allowed_vlans: "16"
            name: iSCSI-VLG-B
            native_vlan: 16
        iscsi_adapter:
          - description: adapter iSCSI Adapter Policy
            dhcp_timeout: 60
            lun_busy_retry_count: 15
            name: adapter
            tcp_connection_timeout: 15
        iscsi_boot:
          - authentication: none
            description: boot iSCSI Boot Policy
            initiator_ip_source: DHCP
            iscsi_adapter_policy: adapter
            name: boot
            primary_target_policy: target
            target_source_type: Static
        iscsi_static_target:
          - description: target iSCSI Static Target Policy
            ip_address: 198.18.32.60
            lun_id: 0
            name: target
            port: 3260
            target_name: iqn.1984-12.com.cisco:lnx1
