---
- name: Configure Intersight Pools
  hosts: localhost
  connection: local
  gather_facts: false
  collections:
    - cisco.intersight
  vars:
    intersight_model_root: "{{ playbook_dir }}/script_vars"
    intersight_api_key_id: "{{ lookup('ansible.builtin.env', 'intersight_api_key_id') }}"
    intersight_api_private_key: "{{ lookup('ansible.builtin.env', 'intersight_secret_key') }}"
    intersight_api_uri: "{{ lookup('ansible.builtin.env', 'intersight_api_uri') | default('https://intersight.com/api/v1', true) }}"
    intersight_validate_certs: "{{ lookup('ansible.builtin.env', 'intersight_validate_certs') | default('true', true) | bool }}"
    intersight_schema: "{{ lookup('ansible.builtin.file', playbook_dir ~ '/../schema/cisco-ai-pods.json') | from_json }}"
    model_files: >-
      {{
        query('ansible.builtin.fileglob', intersight_model_root ~ '/global_settings*.yaml')
        + query('ansible.builtin.fileglob', intersight_model_root ~ '/organizations/*.yaml')
        + query('ansible.builtin.fileglob', intersight_model_root ~ '/pools/*.yaml')
      }}
  environment:
    INTERSIGHT_API_KEY_ID: "{{ intersight_api_key_id }}"
    INTERSIGHT_API_PRIVATE_KEY: "{{ intersight_api_private_key }}"
    INTERSIGHT_API_URI: "{{ intersight_api_uri }}"
  tasks:
    - name: Ensure required authentication variables are present
      ansible.builtin.assert:
        that:
          - intersight_api_key_id | length > 0
          - intersight_api_private_key | length > 0
        fail_msg: >-
          Set intersight_api_key_id and intersight_secret_key before running this playbook.

    - name: Initialize merged model
      ansible.builtin.set_fact:
        merged_model: {}

    - name: Merge model files
      ansible.builtin.set_fact:
        merged_model: >-
          {{
            merged_model
            | combine((lookup('ansible.builtin.file', item) | from_yaml), recursive=True, list_merge='append')
          }}
      loop: "{{ model_files }}"

    - name: Collect organizations map and pool name prefix/suffix
      ansible.builtin.set_fact:
        organizations_map: "{{ merged_model.intersight.organizations | default({}) }}"
        pool_name_prefix: "{{ merged_model.intersight.pools.name_prefix | default({}) }}"
        pool_name_suffix: "{{ merged_model.intersight.pools.name_suffix | default({}) }}"

    - name: Configure MAC pools
      cisco.intersight.intersight_mac_pool: >-
        {{
          item.1
          | merge_schema_defaults(intersight_schema, 'intersight.mac')
          | to_module_params('intersight_mac_pool')
          | combine({
              'name': (pool_name_prefix.mac | default(pool_name_prefix.default | default(''))
                       ~ item.1.name
                       ~ pool_name_suffix.mac | default(pool_name_suffix.default | default(''))),
              'organization': item.0.key,
              'state': 'present'
            })
        }}
      loop: >-
        {{
          query('ansible.builtin.subelements', organizations_map | dict2items,
                'value.pools.mac', {'skip_missing': True})
        }}

    - name: Debug IP pool payloads
      ansible.builtin.debug:
        msg: >-
          {{
            (
              item.1
              | merge_schema_defaults(intersight_schema, 'intersight.ip')
              | to_module_params('intersight_ip_pool')
              | combine({
                  'name': (pool_name_prefix.ip | default(pool_name_prefix.default | default(''))
                           ~ item.1.name
                           ~ pool_name_suffix.ip | default(pool_name_suffix.default | default(''))),
                  'organization': item.0.key,
                  'state': 'present'
                })
            ) | to_nice_json
          }}
      loop: >-
        {{
          query('ansible.builtin.subelements', organizations_map | dict2items,
                'value.pools.ip', {'skip_missing': True})
        }}
      loop_control:
        label: "{{ item.0.key }} :: {{ item.1.name | default('unnamed-ip-pool') }}"

    - name: Configure IP pools
      cisco.intersight.intersight_ip_pool: >-
        {{
          item.1
          | merge_schema_defaults(intersight_schema, 'intersight.ip')
          | to_module_params('intersight_ip_pool')
          | combine({
              'name': (pool_name_prefix.ip | default(pool_name_prefix.default | default(''))
                       ~ item.1.name
                       ~ pool_name_suffix.ip | default(pool_name_suffix.default | default(''))),
              'organization': item.0.key,
              'state': 'present'
            })
        }}
      loop: >-
        {{
          query('ansible.builtin.subelements', organizations_map | dict2items,
                'value.pools.ip', {'skip_missing': True})
        }}

    - name: Configure IQN pools
      cisco.intersight.intersight_iqn_pool: >-
        {{
          item.1
          | merge_schema_defaults(intersight_schema, 'intersight.iqn')
          | to_module_params('intersight_iqn_pool')
          | combine({
              'name': (pool_name_prefix.iqn | default(pool_name_prefix.default | default(''))
                       ~ item.1.name
                       ~ pool_name_suffix.iqn | default(pool_name_suffix.default | default(''))),
              'organization': item.0.key,
              'state': 'present'
            })
        }}
      loop: >-
        {{
          query('ansible.builtin.subelements', organizations_map | dict2items,
                'value.pools.iqn', {'skip_missing': True})
        }}

    - name: Configure UUID pools
      cisco.intersight.intersight_uuid_pool: >-
        {{
          item.1
          | merge_schema_defaults(intersight_schema, 'intersight.uuid')
          | to_module_params('intersight_uuid_pool')
          | combine({
              'name': (pool_name_prefix.uuid | default(pool_name_prefix.default | default(''))
                       ~ item.1.name
                       ~ pool_name_suffix.uuid | default(pool_name_suffix.default | default(''))),
              'organization': item.0.key,
              'state': 'present'
            })
        }}
      loop: >-
        {{
          query('ansible.builtin.subelements', organizations_map | dict2items,
                'value.pools.uuid', {'skip_missing': True})
        }}

    - name: Configure WWNN pools
      cisco.intersight.intersight_wwn_pool: >-
        {{
          item.1
          | merge_schema_defaults(intersight_schema, 'intersight.wwnn')
          | to_module_params('intersight_wwn_pool')
          | combine({
              'name': (pool_name_prefix.wwnn | default(pool_name_prefix.default | default(''))
                       ~ item.1.name
                       ~ pool_name_suffix.wwnn | default(pool_name_suffix.default | default(''))),
              'organization': item.0.key,
              'pool_purpose': 'WWNN',
              'state': 'present'
            })
        }}
      loop: >-
        {{
          query('ansible.builtin.subelements', organizations_map | dict2items,
                'value.pools.wwnn', {'skip_missing': True})
        }}

    - name: Configure WWPN pools
      cisco.intersight.intersight_wwn_pool: >-
        {{
          item.1
          | merge_schema_defaults(intersight_schema, 'intersight.wwpn')
          | to_module_params('intersight_wwn_pool')
          | combine({
              'name': (pool_name_prefix.wwpn | default(pool_name_prefix.default | default(''))
                       ~ item.1.name
                       ~ pool_name_suffix.wwpn | default(pool_name_suffix.default | default(''))),
              'organization': item.0.key,
              'pool_purpose': 'WWPN',
              'state': 'present'
            })
        }}
      loop: >-
        {{
          query('ansible.builtin.subelements', organizations_map | dict2items,
                'value.pools.wwpn', {'skip_missing': True})
        }}
