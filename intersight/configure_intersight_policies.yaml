---
- name: Configure Intersight Policies
  hosts: localhost
  connection: local
  gather_facts: false
  collections:
    - cisco.intersight
  vars:
    intersight_model_root: "{{ playbook_dir }}"
    intersight_api_key_id: "{{ lookup('ansible.builtin.env', 'intersight_api_key_id') }}"
    intersight_api_private_key: "{{ lookup('ansible.builtin.env', 'intersight_secret_key') }}"
    intersight_api_uri: "{{ lookup('ansible.builtin.env', 'intersight_api_uri') | default('https://intersight.com/api/v1', true) }}"
    intersight_validate_certs: "{{ lookup('ansible.builtin.env', 'intersight_validate_certs') | default('true', true) | bool }}"
    module_validate_certs: true
    intersight_schema: "{{ lookup('ansible.builtin.file', playbook_dir ~ '/../schema/cisco-ai-pods.json') | from_json }}"
    model_files: "{{ query('ansible.builtin.fileglob', intersight_model_root ~ '/global_settings*.yaml') + query('ansible.builtin.fileglob', intersight_model_root ~ '/organizations/*.yaml') + query('ansible.builtin.fileglob', intersight_model_root ~ '/policies/*.yaml') }}"
  environment:
    INTERSIGHT_API_KEY_ID: "{{ intersight_api_key_id }}"
    INTERSIGHT_API_PRIVATE_KEY: "{{ intersight_api_private_key }}"
    INTERSIGHT_API_URI: "{{ intersight_api_uri }}"
  tasks:
    - name: Ensure required authentication variables are present
      ansible.builtin.assert:
        that:
          - intersight_api_key_id | length > 0
          - intersight_api_private_key | length > 0
        fail_msg: >-
          Set intersight_api_key_id and intersight_secret_key before running this playbook.

    - name: Initialize merged model
      ansible.builtin.set_fact:
        merged_model: {}

    - name: Merge model files
      ansible.builtin.set_fact:
        merged_model: "{{ merged_model | combine((lookup('ansible.builtin.file', item) | from_yaml), recursive=True, list_merge='append') }}"
      loop: "{{ model_files }}"

    - name: Collect organizations map and policy name prefix/suffix
      ansible.builtin.set_fact:
        organizations_map: "{{ merged_model.intersight.organizations | default({}) }}"
        policy_name_prefix: "{{ merged_model.intersight.policies.name_prefix | default({}) }}"
        policy_name_suffix: "{{ merged_model.intersight.policies.name_suffix | default({}) }}"

    - name: Configure Adapter Configuration policies
      cisco.intersight.intersight_adapter_config_policy: >
        {{
          item.1
          | merge_schema_defaults(intersight_schema, 'intersight.adapter_configuration')
          | to_module_params('intersight_adapter_config_policy')
          | combine({
              'name': (policy_name_prefix.default | default('') ~ item.1.name ~ policy_name_suffix.default | default('')),
              'organization': item.0.key,
              'state': 'present',
              'validate_certs': module_validate_certs
            })
        }}
      loop: "{{ query('ansible.builtin.subelements', organizations_map | dict2items, 'value.policies.adapter_configuration', {'skip_missing': True}) }}"

    - name: Configure BIOS policies
      cisco.intersight.intersight_bios_policy: >
        {{
          item.1
          | merge_schema_defaults(intersight_schema, 'intersight.bios')
          | to_module_params('intersight_bios_policy')
          | combine({
              'name': (policy_name_prefix.default | default('') ~ item.1.name ~ policy_name_suffix.default | default('')),
              'organization': item.0.key,
              'state': 'present',
              'validate_certs': module_validate_certs
            })
        }}
      loop: "{{ query('ansible.builtin.subelements', organizations_map | dict2items, 'value.policies.bios', {'skip_missing': True}) }}"

    - name: Configure Boot Order policies
