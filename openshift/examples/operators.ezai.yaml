      gitops_repo_url: https://github.com/example/openshift-gitops-repo.git # Replace with your actual GitOps repo URL
      prune: false
      self_heal: false
    operators_to_install:
      - ansible-automation-platform
      - external-secrets-operator
      - kubernetes-nmstate-operator
      - node-feature-discovery-operator
      - nvidia-gpu-operator
      - nvidia-network-operator
      - openshift-virtualization
