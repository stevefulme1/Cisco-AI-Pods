# https://docs.redhat.com/en/documentation/openshift_container_platform/4.18/html/hardware_accelerators/rdma-remote-direct-memory-access#rdma-configuring-the-nvidia-network-operator_rdma-remote-direct-memory-access
# https://docs.nvidia.com/networking/display/kubernetes2570/getting-started-openshift.html#network-operator-installation-using-openshift-oc-cli
---
apiVersion: mellanox.com/v1alpha1
kind: NicClusterPolicy
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "15" # Ensures this is applied AFTER the operator is ready
  name: nic-cluster-policy
spec:
  docaTelemetryService:
    image: doca_telemetry
    repository: nvcr.io/nvidia/doca
    version: 1.16.5-doca2.6.0-host
  ofedDriver:
    env:
      - name: CREATE_IFNAMES_UDEV
        value: "true"
      # - name: ENTRYPOINT_DEBUG
      #   value: 'true'
      - name: RESTORE_DRIVER_ON_POD_TERMINATION
        value: 'true'
      - name: UNLOAD_STORAGE_MODULES
        value: 'true'
    image: doca-driver
    repository: nvcr.io/nvidia/mellanox
    version: doca3.2.0-25.10-1.2.8.0-2
    startupProbe:
      initialDelaySeconds: 10
      periodSeconds: 20
    livenessProbe:
      initialDelaySeconds: 30
      periodSeconds: 30
    readinessProbe:
      initialDelaySeconds: 10
      periodSeconds: 30
    upgradePolicy:
      autoUpgrade: true
      drain:
        deleteEmptyDir: true
        enable: true
        force: true
        podSelector: ''
        timeoutSeconds: 300
      maxParallelUpgrades: 1
      safeLoad: false
  rdmaSharedDevicePlugin:
    config: |
      {
        "configList": [
          {
            "resourceName": "rdmashared",
            "rdmaHcaMax": 1000,
            "selectors": {
              "ifNames": [
                "ens201f0np0",
                "ens202f0np0",
                "ens203f0np0",
                "ens204f0np0",
                "ens205f0np0",
                "ens206f0np0",
                "ens207f0np0",
                "ens208f0np0"
              ]
            }
          }
        ]
      }
    image: k8s-rdma-shared-dev-plugin
    repository: nvcr.io/nvidia/mellanox
    version: network-operator-v25.10.0
