---
- name: Generate OpenShift GitOps Application YAML files for OpenShift GitOps
  connection: local
  hosts: localhost
  gather_facts: no
  vars:
    validate_certificates: false
    openshift_defaults:
      destination_directory: "{{ playbook_dir }}/_generated_gitops"
      cluster_name: default
      base_dns_domain: example.com
      operators:
        operators_to_install: []
        nvidia_network_operator:
          mac_vlan: []

  tasks:
    - name: Find variable files under script_vars
      ansible.builtin.find:
        paths: "{{ playbook_dir }}/../script_vars"
        patterns:
          - "*.yml"
          - "*.yaml"
        file_type: file
      register: openshift_var_files

    - name: Merge variable files into a single dictionary
      ansible.builtin.set_fact:
        merged_vars: "{{ merged_vars | default({}) | combine((lookup('ansible.builtin.file', item.path) | from_yaml), recursive=True) }}"
      loop: "{{ openshift_var_files.files | sort(attribute='path') }}"
      loop_control:
        label: "{{ item.path | basename }}"

    - name: Set merged openshift object with defaults
      ansible.builtin.set_fact:
        openshift: "{{ openshift_defaults | combine((merged_vars.openshift | default({})), recursive=True) }}"

    - name: Validate required GitOps configuration
      ansible.builtin.assert:
        that:
          - openshift.operators.openshift_gitops is defined
          - openshift.operators.openshift_gitops.gitops_repo_url is defined
          - openshift.operators.openshift_gitops.gitops_repo_url | length > 0
        fail_msg: "Required value missing: openshift.operators.openshift_gitops.gitops_repo_url"

    - name: Set fact for operator list
      ansible.builtin.set_fact:
        operator_list: "{{ openshift.operators.operators_to_install | default([]) }}"

    - name: Set fact for mac vlan list
      ansible.builtin.set_fact:
        mac_vlan_list: "{{ openshift.operators.nvidia_network_operator.mac_vlan | default([]) }}"

    # - name: Print variable as pretty JSON
    #   ansible.builtin.debug:
    #     msg: "{{ openshift | ansible.builtin.to_nice_json }}"

    - name: Ensure the Destination Directory exists
      ansible.builtin.file:
        path: "{{ openshift.destination_directory }}"
        state: directory

    - name: Copy helm and olm-catalog directories to destination directory
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/{{ item }}"
        dest: "{{ openshift.destination_directory }}"
        remote_src: yes
      loop:
        - helm
        - olm-catalog

    - name: Ensure the operators directory exists
      ansible.builtin.file:
        path: "{{ openshift.destination_directory }}/olm-catalog/operators"
        state: directory

    - name: create the Ansible Automation Platform - AnsibleAutomationPlatform from template
      ansible.builtin.copy:
        content: "{{ lookup('template', 'ansible_automation_platform.yaml.j2') }}"
        dest: "{{ openshift.destination_directory }}/olm-catalog/ansible-automation-platform/04-ansible-automation-platform.yaml"
      when: "'ansible-automation-platform' in operator_list"

    - name: create the Ansible Automation Platform - ConsoleLink from template
      ansible.builtin.copy:
        content: "{{ lookup('template', 'console-link-aap.yaml.j2') }}"
        dest: "{{ openshift.destination_directory }}/olm-catalog/ansible-automation-platform/04-console-link-aap.yaml"
      when: "'ansible-automation-platform' in operator_list"

    - name: create the OpenShift GitOps (ArgoCD) Application YAML files for LLDP DaemonSet from template
      ansible.builtin.copy:
        content: "{{ lookup('template', 'lldp-daemonset.yaml.j2') }}"
        dest: "{{ openshift.destination_directory }}/olm-catalog/operators/lldp-daemonset.yaml"

    - name: Remove standalone operators from operator list if Red Hat OpenShift AI is present
      ansible.builtin.set_fact:
        operator_list: "{{ operator_list | difference(['node-feature-discovery-operator', 'nvidia-gpu-operator', 'nvidia-network-operator']) }}"
      when: "'rhoai-application' in operator_list"

    - name: Create the OpenShift GitOps (ArgoCD) Application YAML files from templates
      ansible.builtin.copy:
        content: "{{ lookup('template', item + '.yaml.j2') }}"
        dest: "{{ openshift.destination_directory }}/olm-catalog/operators/{{ item }}.yaml"
      loop: "{{ operator_list }}"

    - name: Create the Red Hat OpenShift AI - RHOAI OpenShift GitOps (ArgoCD) Application YAML files from templates
      ansible.builtin.copy:
        content: "{{ lookup('template', item + '.yaml.j2') }}"
        dest: "{{ openshift.destination_directory }}/olm-catalog/operators/{{ item }}.yaml"
      loop: ['gpu-operator', 'infrastructure-operators', 'observability-operators', 'scaling-operators']
      when: "'rhoai-application' in operator_list"

    - name: create the NVIDIA Network Operator - MAC VLAN YAML files from template for RHOAI Application
      ansible.builtin.copy:
        content: "{{ lookup('template', 'mac-vlan.yaml.j2') }}"
        dest: "{{ openshift.destination_directory }}/helm/gpu-operator-installation/templates/configs/05-mac-vlan-policy-{{ item.master_interface }}.yaml"
      loop: "{{ mac_vlan_list }}"
      loop_control:
        index_var: item_index
      when: "'rhoai-application' in operator_list and (mac_vlan_list | length > 0)"

    - name: create the NVIDIA Network Operator - MAC VLAN YAML files from template for non-RHOAI Application
      ansible.builtin.copy:
        content: "{{ lookup('template', 'mac-vlan.yaml.j2') }}"
        dest: "{{ openshift.destination_directory }}/olm-catalog/nvidia-network-operator/05-mac-vlan-policy-{{ item.master_interface }}.yaml"
      loop: "{{ mac_vlan_list }}"
      loop_control:
        index_var: item_index
      when: "'rhoai-application' not in operator_list and (mac_vlan_list | length > 0)"
