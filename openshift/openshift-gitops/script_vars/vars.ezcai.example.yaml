openshift:
  base_domain: example.com
  cluster_name: example-cluster
  file_storage_class: fbda-sc
  operators:
    nvidia_network_operator:
      mac_vlan:
        - exclude_ips:
          - 198.18.11.1/32
          ip_range: 198.18.11.0/24
          master_interface: ens201f0np0
        - exclude_ips:
          - 198.18.12.1/32
          ip_range: 198.18.12.0/24
          master_interface: ens202f0np0
        - exclude_ips:
          - 198.18.13.1/32
          ip_range: 198.18.13.0/24
          master_interface: ens203f0np0
        - exclude_ips:
          - 198.18.14.1/32
          ip_range: 198.18.14.0/24
          master_interface: ens204f0np0
        - exclude_ips:
          - 198.18.15.1/32
          ip_range: 198.18.15.0/24
          master_interface: ens205f0np0
        - exclude_ips:
          - 198.18.16.1/32
          ip_range: 198.18.16.0/24
          master_interface: ens206f0np0
        - exclude_ips:
          - 198.18.17.1/32
          ip_range: 198.18.17.0/24
          master_interface: ens207f0np0
        - exclude_ips:
          - 198.18.18.1/32
          ip_range: 198.18.18.0/24
          master_interface: ens208f0np0
    openshift_gitops:
      gitops_repo_url: https://github.com/example/openshift-gitops-repo.git # Replace with your actual GitOps repo URL
      prune: false
      self_heal: false
    operators_to_install:
      - ansible-automation-platform
      - external-secrets-operator
      - kubernetes-nmstate-operator
      - node-feature-discovery-operator
      - nvidia-gpu-operator
      - nvidia-network-operator
      - openshift-virtualization