openshift:
  install:
    bare_metal:
      cluster_domain: example.com
      cluster_name: ai-pods
      cluster_networking:
        api:
          v4: 198.18.0.9
        cluster_network:
          v4_cidr: 10.128.0.0/14
          v4_host_prefix: 23
        ingress:
          v4: 198.18.0.10
        machine_network_gateway:
          v4_gateway: 198.18.0.1/24
        service_network:
          v4_cidr: 172.30.0.0/16
      cluster_version: 4.20.15
      dns_servers:
        - 208.67.220.220
        - 208.67.222.222
