            ip: 198.18.0.51
            inventory_id: r143e-2-1-1
            password: 1
            username: admin
          role: master
          interfaces:
            bond:
              - name: bond0
                lldp_enabled: true
                intfaces:
                  - eno1
                  - eno2
                ip: 198.18.0.11/24
                macs:
                  - 00:1e:67:8c:9b:00
                  - 00:1e:67:8c:9b:01
                mtu: 9000
            ethernet:
              - name: eno5
                ip: 198.18.0.11/24
                lldp_enabled: true
                mac: 00:1e:67:8c:9b:01
                mtu: 9000
