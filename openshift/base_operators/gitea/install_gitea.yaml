---
- name: Install Red Hat Gitea Operator
  connection: local
  hosts: localhost
  gather_facts: false
  vars:
    operator_namespace: gitea-operator
    validate_certificates: false
    openshift_api_url: "{{ lookup('ansible.builtin.env', 'openshift_api_url') }}"
    openshift_token: "{{ lookup('ansible.builtin.env', 'openshift_token_id') }}"

  module_defaults:
    group/kubernetes.core.all:
      host: "{{ openshift_api_url }}"
      api_key: "{{ openshift_token }}"
      validate_certs: "{{ validate_certificates }}"

  pre_tasks:
    - name: Verify required environment variables are set
      ansible.builtin.assert:
        that:
          - openshift_token | length > 0
          - openshift_api_url | length > 0
        fail_msg: "Required environment variables not set: openshift_token_id, openshift_api_url"

  tasks:
    - name: Verify OpenShift API connectivity
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
        name: default
      register: api_check
      retries: 3
      delay: 5
      until: api_check is succeeded

    - name: Create Gitea Operator namespace
      kubernetes.core.k8s:
        api_version: v1
        kind: Namespace
        name: "{{ operator_namespace }}"
        state: present
        validate_certs: "{{ validate_certificates }}"
      register: gitea_namespace_result
      retries: 3
      delay: 5
      until: gitea_namespace_result is succeeded

    - name: Create Gitea Operator Group
      kubernetes.core.k8s:
        definition: "{{ lookup('template', 'operator-group.yaml.j2') | from_yaml }}"
        state: present
        validate_certs: "{{ validate_certificates }}"
      register: gitea_operator_group_result
      retries: 3
      delay: 5
      until: gitea_operator_group_result is succeeded

    - name: Create Gitea Operator Catalog Source
      kubernetes.core.k8s:
        definition: "{{ lookup('template', 'catalog-source.yaml.j2') | from_yaml }}"
        state: present
        validate_certs: "{{ validate_certificates }}"
      register: gitea_catalog_result
      retries: 3
      delay: 5
      until: gitea_catalog_result is succeeded

    - name: Create Gitea Operator subscription
      kubernetes.core.k8s:
        definition: "{{ lookup('template', 'subscription.yaml.j2') | from_yaml }}"
        state: present
        validate_certs: "{{ validate_certificates }}"
      register: gitea_subscription_result
      retries: 3
      delay: 5
      until: gitea_subscription_result is succeeded

    - name: Wait for Gitea Operator deployment to be ready
      kubernetes.core.k8s_info:
        kind: Deployment
        namespace: "{{ operator_namespace }}"
        name: gitea-operator-controller-manager
        validate_certs: "{{ validate_certificates }}"
      register: deployment_info
      until: deployment_info.resources[0].status.availableReplicas | default(0) > 0
      retries: 10
      delay: 30

    - name: Deploy Gitea instance
      kubernetes.core.k8s:
        definition: "{{ lookup('template', 'instance.yaml.j2') | from_yaml }}"
        state: present
        validate_certs: "{{ validate_certificates }}"
      register: gitea_instance_result
      retries: 3
      delay: 5
      until: gitea_instance_result is succeeded
