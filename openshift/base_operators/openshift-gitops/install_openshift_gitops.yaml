---
- name: Install Red Hat OpenShift GitOps Operator
  connection: local
  gather_facts: no
  hosts: localhost
  vars:
    operator_namespace: "openshift-gitops-operator"
    validate_certificates: false

  pre_tasks:
    - name: Verify oc CLI is available
      ansible.builtin.command: which oc
      changed_when: false
      failed_when: oc_check.rc != 0
      register: oc_check

    - name: Verify required environment variables are set
      ansible.builtin.assert:
        that:
          - lookup('ansible.builtin.env', 'openshift_token_id') | length > 0
          - lookup('ansible.builtin.env', 'openshift_api_url') | length > 0
        fail_msg: "Required environment variables not set: openshift_token_id, openshift_api_url"

  tasks:
    - name: Log in to OpenShift (requires oc binary on host)
      ansible.builtin.command:
        cmd: oc login --token={{ lookup('ansible.builtin.env', 'openshift_token_id') }} --server={{ lookup('ansible.builtin.env', 'openshift_api_url') }}
      register: login_result
      no_log: true
      changed_when: false
      retries: 3
      delay: 5
      until: login_result is succeeded

    - name: Create GitOps namespace
      kubernetes.core.k8s:
        api_version: v1
        kind: Namespace
        name: "{{ operator_namespace }}"
        state: present
        validate_certs: "{{ validate_certificates }}"
      register: gitops_namespace_result
      retries: 3
      delay: 5
      until: gitops_namespace_result is succeeded

    - name: Create GitOps Operator subscription
      kubernetes.core.k8s:
        definition: "{{ lookup('template', 'subscription.yaml.j2') | from_yaml }}"
        state: present
        validate_certs: "{{ validate_certificates }}"
      register: gitops_subscription_result
      retries: 3
      delay: 5
      until: gitops_subscription_result is succeeded

    - name: Create GitOps Operator Group
      kubernetes.core.k8s:
        definition: "{{ lookup('template', 'operator-group.yaml.j2') | from_yaml }}"
        state: present
        validate_certs: "{{ validate_certificates }}"
      register: gitops_operator_group_result
      retries: 3
      delay: 5
      until: gitops_operator_group_result is succeeded

    - name: Create GitOps Operator RBAC
      kubernetes.core.k8s:
        definition: "{{ lookup('template', 'rbac.yaml.j2') | from_yaml }}"
        state: present
        validate_certs: "{{ validate_certificates }}"
      register: gitops_rbac_result
      retries: 3
      delay: 5
      until: gitops_rbac_result is succeeded

    - name: Wait for GitOps Operator deployment to be ready
      kubernetes.core.k8s_info:
        kind: Deployment
        namespace: "{{ operator_namespace }}"
        name: openshift-gitops-operator-controller-manager
        validate_certs: "{{ validate_certificates }}"
      register: deployment_info
      until: deployment_info.resources[0].status.availableReplicas | default(0) > 0
      retries: 10
      delay: 30
