---
- name: Configure Pure Storage Arrays (FlashArray and FlashBlade)
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    pure_storage_vars_dir: "{{ playbook_dir }}/script_vars"

  pre_tasks:
    - name: Day0 Provisioning | Load variables from script_vars
      ansible.builtin.include_vars:
        dir: "{{ pure_storage_vars_dir }}"
        extensions:
          - yaml
          - yml

    - name: Day0 Provisioning | Validate pure_storage is defined
      ansible.builtin.assert:
        that:
          - pure_storage is defined
          - (pure_storage.flash_arrays is defined) or (pure_storage.flash_blades is defined)
        fail_msg: "pure_storage data was not loaded or has no flash_arrays/flash_blades entries."

    - name: Day0 Provisioning | Validate Pure Storage environment variables
      block:
        - name: Create temporary directory for validation
          ansible.builtin.tempfile:
            state: directory
            prefix: pure_storage_validation_
          register: temp_dir

        - name: Save pure_storage dict to temporary file
          ansible.builtin.copy:
            content: "{{ pure_storage | to_nice_json }}"
            dest: "{{ temp_dir.path }}/pure_storage.json"
            mode: '0644'
          changed_when: false

        - name: Run Pure Storage environment variables validator
          ansible.builtin.command:
            cmd: "python3 {{ playbook_dir }}/validate_pure_storage_env_vars.py --config {{ temp_dir.path }}/pure_storage.json"
          register: validation_result
          failed_when: validation_result.rc != 0
          changed_when: false

        - name: Display validation results
          ansible.builtin.debug:
            msg: "{{ validation_result.stdout }}"
          when: validation_result.stdout is defined and validation_result.stdout | length > 0

      always:
        - name: Clean up temporary directory
          ansible.builtin.file:
            path: "{{ temp_dir.path }}"
            state: absent
          when: temp_dir.path is defined

  tasks:
    - name: Day0 Provisioning | FlashArray
      ansible.builtin.include_tasks:
        file: "{{ playbook_dir }}/tasks/flash_array/main.yaml"
      vars:
        api_token: "{{ lookup('ansible.builtin.env', 'pure_api_token_{{ item.api_token_id }}') }}"
        array_fqdn: "{{ item.array_fqdn }}"
        array_url: "{{ item.array_url }}"
      when: pure_storage.flash_arrays is defined
      loop: "{{ pure_storage.flash_arrays }}"
      loop_control:
        label: "{{ item.array_fqdn }}"

    - name: Day0 Provisioning | FlashBlade
      ansible.builtin.include_tasks:
        file: "{{ playbook_dir }}/tasks/flash_blade/main.yaml"
      vars:
        api_token: "{{ lookup('ansible.builtin.env', 'pure_api_token_{{ item.api_token_id }}') }}"
        array_fqdn: "{{ item.array_fqdn }}"
        array_url: "{{ item.array_url }}"
      when: pure_storage.flash_blades is defined
      loop: "{{ pure_storage.flash_blades }}"
      loop_control:
        label: "{{ item.array_fqdn }}"
