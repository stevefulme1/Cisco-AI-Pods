---
  ############################
  # Link Aggregation Groups
  ############################

  - name: Slack Notifications | Change for Network > Link Aggregation Group on {{ array_fqdn }}
    local_action:
      module: slack
      token: "{{ slack_token }}"
      msg: "{{ msg.split('\n') }}"
    vars:
      msg: "Array {{ array_fqdn }} link aggregation group configuration has changed\n{{ lag_change.results | map(attribute='invocation') | map(attribute='module_args') | to_nice_yaml }}"
    when: lag_change.changed

  ############################
  # Subnets and Interfaces
  ############################

  - name: Slack Notifications | Change for Network > Subnet on {{ array_fqdn }}
    local_action:
      module: slack
      token: "{{ slack_token }}"
      msg: "{{ msg.split('\n') }}"
    vars:
      msg: "Array {{ array_fqdn }} subnet configuration has changed\n{{ subnet_change.results | map(attribute='invocation') | map(attribute='module_args') | to_nice_yaml }}"
    when: subnet_change.changed

  - name: Slack Notifications | Change for Network > Interface on {{ array_fqdn }}
    local_action:
      module: slack
      token: "{{ slack_token }}"
      msg: "{{ msg.split('\n') }}"
    vars:
      msg: "Array {{ array_fqdn }} interface configuration has changed\n{{ interface_change.results | map(attribute='invocation') | map(attribute='module_args') | to_nice_yaml }}"
    when: interface_change.changed

  ############################
  # DNS Configuration
  ############################

  - name: Slack Notifications | Change for Network > DNS on {{ array_fqdn }}
    local_action:
      module: slack
      token: "{{ slack_token }}"
      msg: "{{ msg.split('\n') }}"
    vars:
      msg: "Array {{ array_fqdn }} DNS configuration has changed\n{{ dns_change.results | map(attribute='invocation') | map(attribute='module_args') | to_nice_yaml }}"
    when: dns_change.changed
