---
  ############################
  # Link Aggregation Groups
  ############################

  - name: Cisco WebEx Notifications | Change for Network > Link Aggregation Group on {{ array_fqdn }}
    community.general.cisco_webex:
      msg: "{{ msg.split('\n') }}"
      msg_type: text
      personal_token: "{{ cisco_webex_token }}"
      recipient_id: "{{ recipient_id }}"
      recipient_type: "{{ recipient_type }}"
    vars:
      msg: "Array {{ array_fqdn }} link aggregation group configuration has changed\n{{ lag_change.results | map(attribute='invocation') | map(attribute='module_args') | to_nice_yaml }}"
    when: lag_change.changed

  ############################
  # Subnets and Interfaces
  ############################

