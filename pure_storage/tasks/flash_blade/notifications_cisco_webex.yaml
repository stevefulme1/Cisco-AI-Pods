---
- name: Cisco WebEx Notifications | Obtain Cisco WebEx Token | for {{ array_fqdn }}
  ansible.builtin.set_fact:
    cisco_webex_token: "{{ lookup('ansible.builtin.env', 'cisco_webex_token') }}"

- name: Cisco WebEx Notifications | Network | for {{ array_fqdn }}
  ansible.builtin.include_tasks:
    file: "notifications_cisco_webex_network.yaml"
  when: pure_storage.settings.network is defined

- name: Cisco WebEx Notifications | Security | for {{ array_fqdn }}
  ansible.builtin.include_tasks:
    file: "notifications_cisco_webex_security.yaml"
  when: pure_storage.settings.security is defined

- name: Cisco WebEx Notifications | System | for {{ array_fqdn }}
  ansible.builtin.include_tasks:
    file: "notifications_cisco_webex_system.yaml"
  when: pure_storage.settings.system is defined
