---
- name: Day0 Provisioning | FlashBlade | Get facts for {{ array_fqdn }}
  purestorage.flashblade.purefb_info:
    api_token: "{{ api_token }}"
    fb_url: "{{ array_url }}"
  register: array_info

- name: Day0 Provisioning | FlashBlade | Set facts
  ansible.builtin.set_fact:
    array_name: "{{ array_fqdn.split('.')[0] }}"
    array_version: "{{ array_info.purefb_info.default.purity_version }}"
    network: "{{ pure_storage.settings.network | default({}) }}"
    security: "{{ pure_storage.settings.security | default({}) }}"
    system: "{{ pure_storage.settings.system | default({}) }}"

- name: Day0 Provisioning | FlashBlade > Settings > Network | for {{ array_fqdn }}
  ansible.builtin.include_tasks:
    file: "settings_network.yaml"
  when: pure_storage.settings.network is defined

- name: Day0 Provisioning | FlashBlade > Settings > Security | for {{ array_fqdn }}
  ansible.builtin.include_tasks:
    file: "settings_security.yaml"
  when: pure_storage.settings.security is defined

- name: Day0 Provisioning | FlashBlade > Settings > System | for {{ array_fqdn }}
  ansible.builtin.include_tasks:
    file: "settings_system.yaml"
  when: pure_storage.settings.system is defined

- name: Day0 Provisioning | FlashBlade Notifications | for {{ array_fqdn }}
  ansible.builtin.include_tasks:
    file: "notifications.yaml"
  when: pure_storage.notifications is defined
