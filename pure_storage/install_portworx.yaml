---
- name: Deploy Portworx 3.5.2 on OpenShift 4.21
  connection: local
  hosts: localhost
  gather_facts: no
  vars:
    validate_certificates: false

  tasks:
    - name: Load variables from script folder
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/script_vars/vars.ezcai.yaml"

    - name: Log in to OpenShift (requires oc binary on host)
      ansible.builtin.command:
        cmd: oc login --token={{ lookup('ansible.builtin.env', 'openshift_token_id') }} --server={{ lookup('ansible.builtin.env', 'openshift_api_url') }}
      register: login_result
      no_log: true # Prevent sensitive info in logs
    
    - name: Create Portworx Namespace
      kubernetes.core.k8s:
        name: "{{ pure_storage.portworx.namespace }}"
        kind: Namespace
        state: present
        validate_certs: "{{ validate_certificates }}"

    - name: Get secret information
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Secret
        name: px-pure-secret
        namespace: "{{ pure_storage.portworx.namespace }}"
        validate_certs: "{{ validate_certificates }}"
      register: secret_check

    - name: Create Portworx Secret
      ansible.builtin.shell:
        cmd: "oc create secret generic px-pure-secret --from-file=pure.json={{ playbook_dir }}/pure.json -n {{ pure_storage.portworx.namespace }}"
      no_log: true
      register: portworx_result
      when: secret_check.resources | length == 0

    - name: Create Subscription for Portworx Operator
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: operators.coreos.com/v1alpha1
          kind: Subscription
          metadata:
            name: portworx-certified
            namespace: openshift-operators
          spec:
            channel: stable
            installPlanApproval: Automatic
            name: portworx-certified
            source: "{{ pure_storage.portworx.operator_source }}"
            sourceNamespace: openshift-marketplace
        validate_certs: "{{ validate_certificates }}"

    - name: Wait for Portworx Operator to be ready
      kubernetes.core.k8s_info:
        kind: Deployment
        name: portworx-operator
        namespace: openshift-operators
        validate_certs: "{{ validate_certificates }}"
      register: operator_deploy
      until: 
        - operator_deploy.resources | length > 0
        - operator_deploy.resources[0].status.readyReplicas | default(0) > 0
      retries: 30
      delay: 15

    - name: Prompt to continue with the next tasks
      ansible.builtin.pause:
        prompt: "Confirm the Operator is ready to 'continue'. Press 'c' to continue or 'a' to abort."

    - name: Deploy Portworx StorageCluster (Version 3.5.2)
      kubernetes.core.k8s:
        state: present
        definition: "{{ lookup('template', 'storage-cluster.yaml.j2') | from_yaml }}"
        validate_certs: "{{ validate_certificates }}"

    - name: Deploy Portworx Storage Classes
      kubernetes.core.k8s:
        state: present
        definition: "{{ lookup('template', 'storage-classes.yaml.j2') | from_yaml }}"
        validate_certs: "{{ validate_certificates }}"
      loop: "{{ pure_storage.portworx.storage_classes }}"
