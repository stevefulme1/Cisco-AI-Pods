---
- name: Create Portworx Secret pure.json file
  connection: local
  gather_facts: false
  hosts: localhost
  vars:
    pure_storage_vars_dir: "{{ playbook_dir }}/script_vars"

  pre_tasks:
    - name: Load variables from script folder
      ansible.builtin.include_vars:
        dir: "{{ pure_storage_vars_dir }}"
        extensions:
          - yaml
          - yml

    - name: Validate portworx configuration exists
      ansible.builtin.assert:
        that:
          - pure_storage is defined
          - pure_storage.portworx is defined
          - (pure_storage.flash_arrays is defined) or (pure_storage.flash_blades is defined)
        fail_msg: "pure_storage.portworx or array inventory is missing from script_vars."

  tasks:
    - name: Pure Storage | Flash Array | Portworx
      ansible.builtin.include_tasks:
        file: "{{ playbook_dir }}/tasks/portworx/flash_array.yaml"
      vars:
        flash_arrays: "{{ pure_storage.flash_arrays }}"
      when: pure_storage.flash_arrays is defined

    - name: Pure Storage | Flash Blade | Portworx
      ansible.builtin.include_tasks:
        file: "{{ playbook_dir }}/tasks/portworx/flash_blade.yaml"
      vars:
        flash_blades: "{{ pure_storage.flash_blades }}"
      when: pure_storage.flash_blades is defined

    - name: Create the pure.json secret from the result outputs
      ansible.builtin.copy:
        content: "{{ lookup('template', 'pure.json.j2') | to_nice_json }}"
        dest: "{{ playbook_dir }}/pure.json"
        mode: "0600"
