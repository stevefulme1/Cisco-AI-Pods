---
- name: Slack Notifications | Obtain Slack Token | for {{ array_fqdn }}
  ansible.builtin.set_fact:
    slack_token: "{{ lookup('ansible.builtin.env', 'slack_token') }}"

- name: Slack Notifications | Network | for {{ array_fqdn }}
  ansible.builtin.include_tasks:
    file: "notifications_slack_network.yaml"
  when: everpure.settings.network is defined

- name: Slack Notifications | Security | for {{ array_fqdn }}
  ansible.builtin.include_tasks:
    file: "notifications_slack_security.yaml"
  when: everpure.settings.security is defined

- name: Slack Notifications | System | for {{ array_fqdn }}
  ansible.builtin.include_tasks:
    file: "notifications_slack_system.yaml"
  when: everpure.settings.system is defined
